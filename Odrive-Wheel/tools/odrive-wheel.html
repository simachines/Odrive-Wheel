// Estado do polling FFB Live
let ffbPollTimer = null;
let ffbPollInFlight = false;

// ---------------- Gráfico FFB Live: torque (Nm) e posição (graus), 60s ----------------
let ffbChartHistory = { trq: [], pos: [] };
function ffbChartMaxSamples() {
  const interval = parseInt(document.getElementById('ffb-poll-interval')?.value, 10) || 500;
  return Math.max(5, Math.ceil(60000 / interval));
}
function ffbChartPush(key, val) {
  if (val === null || val === undefined || isNaN(val)) return;
  ffbChartHistory[key].push(val);
  const max = ffbChartMaxSamples();
  while (ffbChartHistory[key].length > max) ffbChartHistory[key].shift();
}
function _ffbMin(arr) { return arr.length === 0 ? 0 : arr.reduce((a,b) => Math.min(a,b), arr[0]); }
function _ffbMax(arr) { return arr.length === 0 ? 0 : arr.reduce((a,b) => Math.max(a,b), arr[0]); }

function drawFFBChart() {
  const cv = document.getElementById('ffb-chart');
  if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = cv.clientWidth, cssH = cv.clientHeight;
  if (cv.width !== Math.round(cssW * dpr) || cv.height !== Math.round(cssH * dpr)) {
    cv.width  = Math.round(cssW * dpr);
    cv.height = Math.round(cssH * dpr);
  }
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);

  const padL = 60, padR = 60, padT = 14, padB = 22;
  const W = cssW - padL - padR;
  const H = cssH - padT - padB;
  if (W <= 0 || H <= 0) return;

  // Visibilidade por trace (checkbox)
  const showT = document.getElementById('ffb-chart-show-trq')?.checked ?? true;
  const showP = document.getElementById('ffb-chart-show-pos')?.checked ?? true;

  // Auto-scale: torque (Nm) eixo esquerdo, posição (graus) eixo direito.
  // Traces invisíveis NÃO entram no cálculo de min/max.
  const tArr = showT ? ffbChartHistory.trq : [];
  const pArr = showP ? ffbChartHistory.pos : [];
  let tMin = tArr.length ? _ffbMin(tArr) : -1;
  let tMax = tArr.length ? _ffbMax(tArr) :  1;
  let pMin = pArr.length ? _ffbMin(pArr) : -180;
  let pMax = pArr.length ? _ffbMax(pArr) :  180;
  const tPad = Math.max((tMax - tMin) * 0.1, 0.2);
  tMin -= tPad; tMax += tPad;
  const pPad = Math.max((pMax - pMin) * 0.1, 5);
  pMin -= pPad; pMax += pPad;
  if (tMax === tMin) tMax = tMin + 0.5;
  if (pMax === pMin) pMax = pMin + 10;

  // Linha do zero (torque) — destaca valor central pra ver simetria
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  if (tMin < 0 && tMax > 0) {
    const yZero = padT + H - ((0 - tMin) / (tMax - tMin)) * H;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(padL, yZero); ctx.lineTo(padL + W, yZero); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid
  ctx.strokeStyle = '#333';
  ctx.fillStyle = '#888'; ctx.font = '10px monospace';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (H * i) / 4;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + W, y); ctx.stroke();
    const tL = tMax - (tMax - tMin) * i / 4;
    const pR = pMax - (pMax - pMin) * i / 4;
    ctx.fillStyle = '#ef5350'; ctx.textAlign = 'right';
    ctx.fillText(tL.toFixed(2) + 'Nm', padL - 4, y);
    ctx.fillStyle = '#ab47bc'; ctx.textAlign = 'left';
    ctx.fillText(pR.toFixed(0) + '°', padL + W + 4, y);
  }
  ctx.fillStyle = '#888'; ctx.textAlign = 'left';
  ctx.fillText('-60s', padL, padT + H + 12);
  ctx.textAlign = 'right';
  ctx.fillText('agora', padL + W, padT + H + 12);

  function plotTrace(arr, color, yMin, yMax) {
    if (arr.length < 2) return;
    const max = ffbChartMaxSamples();
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < arr.length; i++) {
      const x = padL + W - ((arr.length - 1 - i) * W / (max - 1));
      const t = (arr[i] - yMin) / (yMax - yMin);
      const y = padT + H - t * H;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  if (showT) plotTrace(ffbChartHistory.trq, '#ef5350', tMin, tMax);
  if (showP) plotTrace(ffbChartHistory.pos, '#ab47bc', pMin, pMax);

  const lastT = tArr.length ? tArr[tArr.length-1] : null;
  const lastP = pArr.length ? pArr[pArr.length-1] : null;
  const setT = (id, val, unit, dec) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val !== null ? val.toFixed(dec) + unit : '—';
  };
  setT('ffb-chart-leg-trq', lastT, ' Nm', 3);
  setT('ffb-chart-leg-pos', lastP, '°', 1);
  const stats = document.getElementById('ffb-chart-stats');
  if (stats) {
    const interval = parseInt(document.getElementById('ffb-poll-interval')?.value, 10) || 500;
    stats.textContent = `${tArr.length} samples / ${ffbChartMaxSamples()} max @ ${interval}ms`;
  }
}
// Janela de samples de magnitude do Effect 0 pra análise de dinâmica.
// Usa array circular limitado pra não crescer indefinidamente.
let ffbMagSamples = [];
const FFB_MAG_WINDOW_MAX = 100;  // ~50s a 500ms poll, ~10s a 100ms
function ffbMagReset() { ffbMagSamples = []; }
function ffbMagPush(val) {
  if (val === null || isNaN(val)) return;
  ffbMagSamples.push(val);
  if (ffbMagSamples.length > FFB_MAG_WINDOW_MAX) ffbMagSamples.shift();
}
function ffbMagStats() {
  if (ffbMagSamples.length === 0) return null;
  let min = Infinity, max = -Infinity, sum = 0, maxJump = 0;
  for (let i = 0; i < ffbMagSamples.length; i++) {
    const v = ffbMagSamples[i];
    if (v < min) min = v;
    if (v > max) max = v;
    sum += v;
    if (i > 0) {
      const jump = Math.abs(v - ffbMagSamples[i-1]);
      if (jump > maxJump) maxJump = jump;
    }
  }
  return {
    n: ffbMagSamples.length,
    min, max,
    range: max - min,
    avg: sum / ffbMagSamples.length,
    maxJump
  };
}

// Helpers de regex pra parsear cada diag command
function _setKV(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}
function _parseKVPairs(line, regex) {
  // Aceita "k1=v1 k2=v2 k3=v3" — retorna {k1:v1, k2:v2, ...}
  const out = {};
  if (!line) return out;
  let m;
  while ((m = regex.exec(line)) !== null) out[m[1]] = m[2];
  return out;
}

// Estado pra calcular taxa (Hz) dos contadores monotônicos do firmware.
// Guarda ultimo valor e timestamp pra derivar dN/dt no próximo poll.
const _ffbRate = {
  hout:  { last: null, ts: 0 },
  setef: { last: null, ts: 0 },
  efop:  { last: null, ts: 0 },
};
function _computeRate(slot, current) {
  const now = performance.now();
  const prev = _ffbRate[slot];
  let hz = null;
  if (prev.last !== null && now > prev.ts) {
    const dt = (now - prev.ts) / 1000;        // segundos
    const dN = current - prev.last;
    if (dN >= 0 && dt > 0.05) hz = dN / dt;   // ignora intervalos ínfimos / contador resetado
  }
  prev.last = current;
  prev.ts = now;
  return hz;
}
function _setRateKV(id, hz) {
  const el = document.getElementById(id);
  if (!el) return;
  if (hz === null) { el.textContent = '—'; el.className = 'v'; return; }
  el.textContent = hz.toFixed(0) + ' Hz';
  // Verde ≥60, amarelo 30-60, vermelho <30, cinza zero
  if (hz === 0)        el.className = 'v';
  else if (hz < 30)    el.className = 'v err';
  else if (hz < 60)    el.className = 'v warn';
  else                 el.className = 'v ok';
}

async function pollFFBLiveOnce() {
  if (!writer || ffbPollInFlight) return;
  ffbPollInFlight = true;
  const dot = document.getElementById('ffb-poll-dot');
  if (dot) dot.classList.add('on');
  try {
    // 'd' → ffb=N eff=N hout=N setEf=N
    const dr = await sendCmd('d', true).catch(() => null);
    if (dr) {
      const m = dr.match(/ffb=(\d+)\s+eff=(\d+)\s+hout=(\d+)\s+setEf=(\d+)/);
      if (m) {
        _setKV('ffb-kv-active', m[1] === '1' ? '✓ ATIVO' : '✗ inativo');
        _setKV('ffb-kv-eff',    m[2]);
        _setKV('ffb-kv-hout',   m[3]);
        _setKV('ffb-kv-setef',  m[4]);
        // Calcula Hz a partir dos contadores
        _setRateKV('ffb-kv-rate-hout',  _computeRate('hout',  parseInt(m[3], 10)));
        _setRateKV('ffb-kv-rate-setef', _computeRate('setef', parseInt(m[4], 10)));
      }
    }
    // 'D' → ctrl=N newef=N setef=N efop=N
    const Dr = await sendCmd('D', true).catch(() => null);
    if (Dr) {
      const m = Dr.match(/ctrl=(\d+)\s+newef=(\d+)\s+setef=(\d+)\s+efop=(\d+)/);
      if (m) {
        _setKV('ffb-kv-ctrl',   m[1]);
        _setKV('ffb-kv-newef',  m[2]);
        _setKV('ffb-kv-setefr', m[3]);
        _setKV('ffb-kv-efop',   m[4]);
        _setRateKV('ffb-kv-rate-efop', _computeRate('efop', parseInt(m[4], 10)));
      }
    }
    // 'C' → cond=N cnst=N prdc=N
    const Cr = await sendCmd('C', true).catch(() => null);
    if (Cr) {
      const m = Cr.match(/cond=(\d+)\s+cnst=(\d+)\s+prdc=(\d+)/);
      if (m) {
        _setKV('ffb-kv-cond', m[1]);
        _setKV('ffb-kv-cnst', m[2]);
        _setKV('ffb-kv-prdc', m[3]);
      }
    }
    // 'T' → lt=N nm=X.XXXX
    const Tr = await sendCmd('T', true).catch(() => null);
    if (Tr) {
      const m = Tr.match(/lt=(-?\d+)\s+nm=(-?\d+\.\d+)/);
      if (m) {
        _setKV('ffb-kv-lt',  m[1]);
        _setKV('ffb-kv-trq', m[2] + ' Nm');
        // Captura pra gráfico
        ffbChartPush('trq', parseFloat(m[2]));
      }
    }
    // 'E0', 'E1', 'E2' → cada um retorna idx=N st=N t=N mag=N ax=X.XX g=N GG=N
    // pro N-ésimo efeito ativo (skip N efeitos com state=0).
    const TYPES = {0:'NONE',1:'CONSTANT',2:'RAMP',3:'SQUARE',4:'SINE',5:'TRIANGLE',
                   6:'SAWTOOTHUP',7:'SAWTOOTHDOWN',8:'SPRING',9:'DAMPER',
                   10:'INERTIA',11:'FRICTION',12:'CUSTOM'};
    const STATES = {0:'INACTIVE',1:'PLAYING'};
    let lastGG = null;
    for (let n = 0; n < 3; n++) {
      const r = await sendCmd('E' + n, true).catch(() => null);
      if (!r) {
        _setKV('ffb-kv-eidx-'+n,  '—');
        _setKV('ffb-kv-est-'+n,   '—');
        _setKV('ffb-kv-etype-'+n, '—');
        _setKV('ffb-kv-emag-'+n,  '—');
        _setKV('ffb-kv-eax-'+n,   '—');
        _setKV('ffb-kv-egain-'+n, '—');
        continue;
      }
      const m = r.match(/idx=(-?\d+)\s+st=(\d+)\s+t=(\d+)\s+mag=(-?\d+)\s+ax=(-?\d+\.\d+)\s+g=(\d+)\s+GG=(\d+)/);
      if (m) {
        const empty = m[1] === '-1';
        _setKV('ffb-kv-eidx-'+n,  empty ? '—' : m[1]);
        _setKV('ffb-kv-est-'+n,   empty ? '—' : (STATES[m[2]] || m[2]));
        _setKV('ffb-kv-etype-'+n, empty ? '—' : (TYPES[m[3]] || m[3]));
        _setKV('ffb-kv-emag-'+n,  empty ? '—' : m[4]);
        _setKV('ffb-kv-eax-'+n,   empty ? '—' : m[5]);
        _setKV('ffb-kv-egain-'+n, empty ? '—' : m[6]);
        lastGG = m[7];
        // Captura mag do Effect 0 pra análise de dinâmica
        if (n === 0 && !empty) ffbMagPush(parseInt(m[4], 10));
      }
    }
    if (lastGG !== null) _setKV('ffb-kv-egg', lastGG);

    // Atualiza estatísticas da janela de magnitude do Effect 0
    const stats = ffbMagStats();
    if (stats) {
      _setKV('ffb-kv-mag-n',     stats.n);
      _setKV('ffb-kv-mag-min',   stats.min);
      _setKV('ffb-kv-mag-max',   stats.max);
      _setKV('ffb-kv-mag-range', stats.range);
      _setKV('ffb-kv-mag-avg',   stats.avg.toFixed(0));
      _setKV('ffb-kv-mag-jump',  stats.maxJump);
    } else {
      _setKV('ffb-kv-mag-n', '0');
    }
    // 'I' → Ibus=X..Y Mot=X..Y V=X..Y (peaks)
    const Ir = await sendCmd('I', true).catch(() => null);
    if (Ir) {
      const m = Ir.match(/Ibus=(-?\d+\.\d+)\.\.(-?\d+\.\d+)\s+Mot=(-?\d+\.\d+)\.\.(-?\d+\.\d+)\s+V=(-?\d+\.\d+)\.\.(-?\d+\.\d+)/);
      if (m) {
        _setKV('ffb-kv-ibmin',  m[1] + ' A');
        _setKV('ffb-kv-ibmax',  m[2] + ' A');
        _setKV('ffb-kv-mibmin', m[3] + ' A');
        _setKV('ffb-kv-mibmax', m[4] + ' A');
        _setKV('ffb-kv-vbmin',  m[5] + ' V');
        _setKV('ffb-kv-vbmax',  m[6] + ' V');
      }
    }
    // sys.fxtest? — tem pos/spd em formato amigável que diag não dá
    const fr = await readPropOffb('sys.fxtest').catch(() => null);
    if (fr) {
      const m = fr.match(/ffb=(\d+)\s+pos=(-?\d+\.\d+)\s+spd=(-?\d+\.\d+)\s+trq=(-?\d+\.\d+)\s+fx=(\d+)/);
      if (m) {
        _setKV('ffb-kv-pos', m[2] + '°');
        _setKV('ffb-kv-spd', m[3]);
        // Captura posição pro gráfico
        ffbChartPush('pos', parseFloat(m[2]));
      }
    }
    // Renderiza gráfico FFB
    drawFFBChart();
  } finally {
    if (dot) dot.classList.remove('on');
    ffbPollInFlight = false;
  }
}

function ffbPollStart() {
  if (ffbPollTimer) clearInterval(ffbPollTimer);
  const interval = parseInt(document.getElementById('ffb-poll-interval').value, 10) || 500;
  pollFFBLiveOnce();   // imediato
  ffbPollTimer = setInterval(pollFFBLiveOnce, interval);
}
function ffbPollStop() {
  if (ffbPollTimer) {
    clearInterval(ffbPollTimer);
    ffbPollTimer = null;
  }
}

function wireFFBLive() {
  const enable = document.getElementById('ffb-poll-enable');
  const interval = document.getElementById('ffb-poll-interval');
  const once = document.getElementById('btn-ffb-poll-once');
  const resetPeaks = document.getElementById('btn-ffb-reset-peaks');
  if (!enable) return; // tab not yet built

  enable.addEventListener('change', () => {
    if (enable.checked) ffbPollStart(); else ffbPollStop();
  });
  interval.addEventListener('change', () => {
    if (enable.checked) ffbPollStart();
  });
  once.addEventListener('click', () => pollFFBLiveOnce());
  resetPeaks.addEventListener('click', async () => {
    await sendCmd('R', true).catch(() => {});
    pollFFBLiveOnce();
  });
  const magReset = document.getElementById('btn-ffb-mag-reset');
  if (magReset) magReset.addEventListener('click', () => {
    ffbMagReset();
    pollFFBLiveOnce();
  });
  const chartClear = document.getElementById('btn-ffb-chart-clear');
  if (chartClear) chartClear.addEventListener('click', () => {
    ffbChartHistory = { trq: [], pos: [] };
    drawFFBChart();
  });
  ['ffb-chart-show-trq', 'ffb-chart-show-pos'].forEach(id => {
    const cb = document.getElementById(id);
    if (cb) cb.addEventListener('change', drawFFBChart);
  });
}

async function refreshAll() {
  await refreshInfo();
  await refreshLive();   // já chama refreshErrors no fim
}

function initDebugTab() {
  // Botão grande "Atualizar tudo" no topo
  const btnAll = document.getElementById('btn-refresh-all');
  if (btnAll) btnAll.onclick = refreshAll;

  // Atalho de teclado R quando a aba Debug está ativa
  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
      const debugActive = document.querySelector('#tab-debug.active');
      const editingInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName);
      if (debugActive && !editingInput && port) {
        e.preventDefault();
        refreshAll();
      }
    }
  });

  // Action buttons — agora com auto-refresh do estado/erros após o comando
  document.querySelectorAll('#tab-debug button[data-act]').forEach(btn => {
    btn.onclick = async () => {
      // Confirm com i18n se data-confirm-i18n setado, senão usa data-confirm raw
      const confirmMsg = btn.dataset.confirmI18n ? t(btn.dataset.confirmI18n) : btn.dataset.confirm;
      if (confirmMsg && !confirm(confirmMsg)) return;
      const act = btn.dataset.act;
      if (act === 'state') {
        await sendCmd('w axis0.requested_state ' + btn.dataset.val, false);
        // Espera firmware processar transição (state machine pode demorar
        // 1-2 ciclos pra entrar/sair de estado), aí faz refresh visual.
        await new Promise(r => setTimeout(r, 300));
        await refreshLive();   // atualiza state + errors + tudo mais
      } else if (act === 'raw') {
        await sendCmd(btn.dataset.val, false);
        await new Promise(r => setTimeout(r, 200));
        await refreshLive();
      } else if (act === 'clear-errors') {
        // ODrive v0.5.6 ASCII: comando 'sc' chama odrv.clear_errors() que
        // (1) zera todos os error fields E (2) re-arma o brake_resistor
        // se enable_brake_resistor=true. Escrever 0 direto nos campos via
        // 'w *.error 0' NÃO re-arma o brake — daí o motor.arm() falhava
        // depois de um regen overcurrent que tinha desarmado o brake.
        await sendCmd('sc', false);
        logLine('--- sc (clear_errors + rearm brake) enviado ---');
        await new Promise(r => setTimeout(r, 200));
        await refreshErrors();
        await refreshLive();
      }
    };
  });

  // Wire chart clear button + checkboxes de visibilidade
  const chartClear = document.getElementById('btn-chart-clear');
  if (chartClear) chartClear.addEventListener('click', () => {
    chartHistory = { vbus: [], ibus: [], iq: [], ibr: [] };
    drawChart();
  });
  ['chart-show-vbus', 'chart-show-ibus', 'chart-show-iq', 'chart-show-ibr'].forEach(id => {
    const cb = document.getElementById(id);
    if (cb) cb.addEventListener('change', drawChart);
  });

  document.getElementById('btn-read-info').onclick = refreshInfo;
  document.getElementById('btn-poll-once').onclick = () => refreshLive();
  document.getElementById('poll-enable').onchange = togglePolling;
  document.getElementById('poll-interval').onchange = () => {
    if (pollTimer) { stopPolling(); startPolling(); }
  };

  buildErrRows();
}

function buildErrRows() {
  const target = document.getElementById('err-list');
  if (!target) return;
  const errors = [
    { id: 'err-odrv',   label: 'odrv.error',              path: 'error',              map: ERR_BITS_ODRIVE },
    { id: 'err-axis',   label: 'axis0.error',             path: 'axis0.error',        map: ERR_BITS_AXIS },
    { id: 'err-motor',  label: 'axis0.motor.error',       path: 'axis0.motor.error',  map: ERR_BITS_MOTOR },
    { id: 'err-enc',    label: 'axis0.encoder.error',     path: 'axis0.encoder.error',map: ERR_BITS_ENCODER },
    { id: 'err-ctrl',   label: 'axis0.controller.error',  path: 'axis0.controller.error', map: ERR_BITS_CTRL },
  ];
  target.innerHTML = '';
  errors.forEach(e => {
    const row = document.createElement('div');
    row.className = 'err-row';
    row.innerHTML = `
      <span class="k">${e.label}</span>
      <span class="hex" id="${e.id}-hex">—</span>
      <span class="bits" id="${e.id}-bits"></span>
      <button data-err-refresh="${e.path}:${e.id}">↻</button>
    `;
    target.appendChild(row);
  });
  // Expose map for refresh
  target._errors = errors;
  // Wire-up individual refresh buttons
  target.querySelectorAll('button[data-err-refresh]').forEach(btn => {
    btn.onclick = async () => {
      const [path, id] = btn.dataset.errRefresh.split(':');
      const entry = errors.find(x => x.id === id);
      if (entry) await refreshOneError(entry);
    };
  });
}

async function refreshOneError(entry) {
  const raw = await readProp(entry.path);
  if (raw === null) return;
  const v = parseInt(raw, 10);
  const hex = '0x' + (isNaN(v) ? 0 : v).toString(16).toUpperCase().padStart(8, '0');
  const hexEl = document.getElementById(entry.id + '-hex');
  const bitsEl = document.getElementById(entry.id + '-bits');
  hexEl.textContent = hex;
  hexEl.className = 'hex ' + (v === 0 ? 'ok' : 'err');
  bitsEl.textContent = v === 0 ? '' : decodeErr(v.toString(16), entry.map);
}

async function refreshErrors() {
  const target = document.getElementById('err-list');
  if (!target || !target._errors) return;
  for (const e of target._errors) await refreshOneError(e);
}

async function refreshInfo() {
  const kvMap = [
    ['fw', 'fw_version_major', 'fw_version_minor', 'fw_version_revision'],
    ['hw', 'hw_version_major', 'hw_version_minor', 'hw_version_variant'],
    ['sn', 'serial_number'],
    ['ucl', 'user_config_loaded'],
  ];
  // fw/hw: tripla, monta string
  const fwMaj = await readProp('fw_version_major');
  const fwMin = await readProp('fw_version_minor');
  const fwRev = await readProp('fw_version_revision');
  document.getElementById('kv-fw').textContent =
    [fwMaj, fwMin, fwRev].map(x => x || '?').join('.');
  const hwMaj = await readProp('hw_version_major');
  const hwMin = await readProp('hw_version_minor');
  const hwVar = await readProp('hw_version_variant');
  document.getElementById('kv-hw').textContent =
    (hwMaj || '?') + '.' + (hwMin || '?') + '-' + (hwVar || '?') + 'V';
  const sn = await readProp('serial_number');
  document.getElementById('kv-sn').textContent = sn || '—';
  const ucl = await readProp('user_config_loaded');
  const uclEl = document.getElementById('kv-ucl');
  uclEl.textContent = ucl || '—';
  uclEl.className = 'v ' + (ucl === 'True' ? 'ok' : 'warn');
}

// ---------------- Gráfico Debug/Stats: vbus / ibus / Iq motor / I brake, 1 min ---------
// Cada amostra é um número (parseFloat). Capacidade depende do intervalo de auto-refresh.
let chartHistory = { vbus: [], ibus: [], iq: [], ibr: [] };
function chartMaxSamples() {
  const interval = parseInt(document.getElementById('poll-interval')?.value, 10) || 500;
  // Janela fixa de 60s — número de samples = 60000 / intervalo (mín 5)
  return Math.max(5, Math.ceil(60000 / interval));
}
function chartPush(key, val) {
  if (val === null || val === undefined || isNaN(val)) return;
  chartHistory[key].push(val);
  const max = chartMaxSamples();
  while (chartHistory[key].length > max) chartHistory[key].shift();
}
function _trMin(arr) { return arr.length === 0 ? 0 : arr.reduce((a,b) => Math.min(a,b), arr[0]); }
function _trMax(arr) { return arr.length === 0 ? 0 : arr.reduce((a,b) => Math.max(a,b), arr[0]); }

function drawChart() {
  const cv = document.getElementById('dbg-chart');
  if (!cv) return;
  // Resize canvas pra match CSS pixels (HiDPI-aware)
  const dpr = window.devicePixelRatio || 1;
  const cssW = cv.clientWidth, cssH = cv.clientHeight;
  if (cv.width !== Math.round(cssW * dpr) || cv.height !== Math.round(cssH * dpr)) {
    cv.width  = Math.round(cssW * dpr);
    cv.height = Math.round(cssH * dpr);
  }
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);

  // Margens (left pra eixo V, right pra eixo A)
  const padL = 50, padR = 50, padT = 14, padB = 22;
  const W = cssW - padL - padR;
  const H = cssH - padT - padB;
  if (W <= 0 || H <= 0) return;

  // Visibilidade por trace (checkbox) — afeta scale + plot
  const showV  = document.getElementById('chart-show-vbus')?.checked ?? true;
  const showI  = document.getElementById('chart-show-ibus')?.checked ?? true;
  const showQ  = document.getElementById('chart-show-iq')?.checked   ?? true;
  const showB  = document.getElementById('chart-show-ibr')?.checked  ?? true;

  // Auto-scale: vbus separado (left axis), ibus+iq+ibrake juntos (right axis).
  // Traces invisíveis NÃO entram no cálculo de min/max — escala foca no que está visível.
  const vArr = showV ? chartHistory.vbus : [];
  const aArr = [
    ...(showI ? chartHistory.ibus : []),
    ...(showQ ? chartHistory.iq   : []),
    ...(showB ? chartHistory.ibr  : [])
  ];
  let vMin = vArr.length ? _trMin(vArr) : 0;
  let vMax = vArr.length ? _trMax(vArr) : 30;
  let aMin = aArr.length ? _trMin(aArr) : -1;
  let aMax = aArr.length ? _trMax(aArr) : 1;
  // Padding visual de 5% e mínimo de range pra não ter linha "achatada"
  const vPad = Math.max((vMax - vMin) * 0.1, 0.5);
  vMin -= vPad; vMax += vPad;
  const aPad = Math.max((aMax - aMin) * 0.1, 0.5);
  aMin -= aPad; aMax += aPad;
  if (vMax === vMin) vMax = vMin + 1;
  if (aMax === aMin) aMax = aMin + 1;

  // Grid + axes labels
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.fillStyle = '#888'; ctx.font = '10px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (H * i) / 4;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + W, y); ctx.stroke();
    const vL = vMax - (vMax - vMin) * i / 4;
    const vR = aMax - (aMax - aMin) * i / 4;
    ctx.fillStyle = '#4fc3f7';
    ctx.fillText(vL.toFixed(1) + 'V', padL - 4, y);
    ctx.fillStyle = '#ffa726';
    ctx.textAlign = 'left';
    ctx.fillText(vR.toFixed(2) + 'A', padL + W + 4, y);
    ctx.textAlign = 'right';
  }
  // X axis: 0s na direita (atual), -60s na esquerda
  ctx.fillStyle = '#888'; ctx.textAlign = 'left';
  ctx.fillText('-60s', padL, padT + H + 12);
  ctx.textAlign = 'right';
  ctx.fillText('agora', padL + W, padT + H + 12);

  // Plot trace helper — arr de valores, cor, escala y (vMin/vMax)
  function plotTrace(arr, color, yMin, yMax) {
    if (arr.length < 2) return;
    const max = chartMaxSamples();
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < arr.length; i++) {
      // x: alinhado à direita (último ponto = atual)
      const x = padL + W - ((arr.length - 1 - i) * W / (max - 1));
      const t = (arr[i] - yMin) / (yMax - yMin);
      const y = padT + H - t * H;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  if (showV) plotTrace(chartHistory.vbus, '#4fc3f7', vMin, vMax);
  if (showI) plotTrace(chartHistory.ibus, '#ffa726', aMin, aMax);
  if (showQ) plotTrace(chartHistory.iq,   '#66bb6a', aMin, aMax);
  if (showB) plotTrace(chartHistory.ibr,  '#ef5350', aMin, aMax);

  // Legenda com último valor
  const lastV = vArr.length ? vArr[vArr.length-1] : null;
  const lastI = chartHistory.ibus.length ? chartHistory.ibus[chartHistory.ibus.length-1] : null;
  const lastQ = chartHistory.iq.length   ? chartHistory.iq[chartHistory.iq.length-1]     : null;
  const lastB = chartHistory.ibr.length  ? chartHistory.ibr[chartHistory.ibr.length-1]   : null;
  const setT = (id, val, unit, dec) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val !== null ? val.toFixed(dec) + unit : '—';
  };
  setT('chart-leg-vbus', lastV, ' V', 2);
  setT('chart-leg-ibus', lastI, ' A', 2);
  setT('chart-leg-iq',   lastQ, ' A', 2);
  setT('chart-leg-ibr',  lastB, ' A', 2);
  const stats = document.getElementById('chart-stats');
  if (stats) {
    const interval = parseInt(document.getElementById('poll-interval')?.value, 10) || 500;
    stats.textContent = `${vArr.length} samples / ${chartMaxSamples()} max @ ${interval}ms`;
  }
}

async function refreshLive() {
  // Bulk read — cada call é síncrona + sequencial (queue pattern)
  const reads = [
    ['kv-vbus',    'vbus_voltage',                           (v) => parseFloat(v).toFixed(3) + ' V'],
    ['kv-ibus',    'ibus',                                   (v) => parseFloat(v).toFixed(3) + ' A'],
    ['kv-ibrake',  'brake_resistor_current',                 (v) => parseFloat(v).toFixed(3) + ' A'],
    ['kv-state',   'axis0.current_state',                    (v) => v + ' (' + (ENUM_AXIS_STATE[parseInt(v)] || '?') + ')'],
    ['kv-reqstate','axis0.requested_state',                  (v) => v + ' (' + (ENUM_AXIS_STATE[parseInt(v)] || '?') + ')'],
    ['kv-mcal',    'axis0.motor.is_calibrated',              (v) => v],
    ['kv-marmed',  'axis0.motor.is_armed',                   (v) => v],
    ['kv-eready',  'axis0.encoder.is_ready',                 (v) => v],
    ['kv-eidx',    'axis0.encoder.index_found',              (v) => v],
    ['kv-epos',    'axis0.encoder.pos_estimate',             (v) => parseFloat(v).toFixed(4) + ' turn'],
    ['kv-evel',    'axis0.encoder.vel_estimate',             (v) => parseFloat(v).toFixed(3) + ' turn/s'],
    ['kv-esc',     'axis0.encoder.shadow_count',             (v) => v],
    ['kv-ecpr',    'axis0.encoder.count_in_cpr',             (v) => v],
    ['kv-ephase',  'axis0.encoder.phase',                    (v) => parseFloat(v).toFixed(4) + ' rad'],
    ['kv-iq',      'axis0.motor.current_control.Iq_measured',(v) => parseFloat(v).toFixed(3) + ' A'],
    ['kv-id',      'axis0.motor.current_control.Id_measured',(v) => parseFloat(v).toFixed(3) + ' A'],
    ['kv-iqsp',    'axis0.motor.current_control.Iq_setpoint',(v) => parseFloat(v).toFixed(3) + ' A'],
    ['kv-ftemp',   'axis0.motor.fet_thermistor.temperature', (v) => parseFloat(v).toFixed(1) + ' °C'],
    ['kv-mtemp',   'axis0.motor.motor_thermistor.temperature',(v) => parseFloat(v).toFixed(1) + ' °C'],
    ['kv-tqsp',    'axis0.controller.torque_setpoint',       (v) => parseFloat(v).toFixed(3)],
    ['kv-vsp',     'axis0.controller.vel_setpoint',          (v) => parseFloat(v).toFixed(3)],
    ['kv-psp',     'axis0.controller.pos_setpoint',          (v) => parseFloat(v).toFixed(4)],
  ];
  // Capturar valores brutos pra alimentar o gráfico (vbus, ibus, Iq_measured)
  const chartCapture = {};
  for (const [id, path, fmt] of reads) {
    const v = await readProp(path);
    if (v !== null) {
      const el = document.getElementById(id);
      if (el) {
        try { el.textContent = fmt(v); } catch(e) { el.textContent = v; }
        if (v === 'True') el.className = 'v ok';
        else if (v === 'False') el.className = 'v warn';
        else el.className = 'v';
      }
      // Captura raw pra chart
      if (path === 'vbus_voltage') chartCapture.vbus = parseFloat(v);
      else if (path === 'ibus')    chartCapture.ibus = parseFloat(v);
      else if (path === 'brake_resistor_current') chartCapture.ibr = parseFloat(v);
      else if (path === 'axis0.motor.current_control.Iq_measured') chartCapture.iq = parseFloat(v);
    }
  }
  // Empurra na história + desenha
  if (!isNaN(chartCapture.vbus)) chartPush('vbus', chartCapture.vbus);
  if (!isNaN(chartCapture.ibus)) chartPush('ibus', chartCapture.ibus);
  if (!isNaN(chartCapture.iq))   chartPush('iq',   chartCapture.iq);
  if (!isNaN(chartCapture.ibr))  chartPush('ibr',  chartCapture.ibr);
  drawChart();

  await refreshErrors();
}

let pollTimer = null;
function togglePolling(e) {
  if (e.target.checked) startPolling();
  else stopPolling();
}
function startPolling() {
  if (pollTimer) return;
  const interval = parseInt(document.getElementById('poll-interval').value) || 500;
  document.getElementById('poll-dot').classList.add('on');
  const tick = async () => {
    if (!pollTimer) return;
    try { await refreshLive(); } catch(e) {}
    if (pollTimer) pollTimer = setTimeout(tick, interval);
  };
  pollTimer = setTimeout(tick, 0);
}
function stopPolling() {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  const dot = document.getElementById('poll-dot');
  if (dot) dot.classList.remove('on');
}

function selectTab(id) {
  document.querySelectorAll('nav#tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('#sidebar-nav .sidebar-item').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === tabId(id)));
  // Para o poll FFB Live ao sair da aba pra não bloquear o serial em outras abas
  if (id !== 'ffb-live' && typeof ffbPollStop === 'function') {
    ffbPollStop();
    const ck = document.getElementById('ffb-poll-enable');
    if (ck) ck.checked = false;
  }
  // Re-aplica busca pra atualizar o banner / matches da nova aba
  const si = document.getElementById('search-input');
  if (si && si.value.trim() && typeof applySearch === 'function') {
    applySearch(si.value);
  }
}

function getInputValue(input) {
  if (input.dataset.type === 'bool') return input.checked ? '1' : '0';
  return input.value.trim();
}

// Estados visuais possíveis do input:
//   'neutral'  → branco — valor lido do device, sem mudança pendente
//   'changed'  → vermelho — user editou mas ainda não enviou
//   'synced'   → verde — enviado com sucesso pro device
//
// Aplicamos via INLINE STYLES (não via classes CSS) pra garantir precedência
// máxima sobre qualquer regra do stylesheet (cache, especificidade, etc).
// Classes ainda são adicionadas pra permitir CSS adicional opcional futuro.
function _applyFieldState(input, state) {
  // Reset todos os estilos relacionados a estado
  input.style.removeProperty('color');
  input.style.removeProperty('background-color');
  input.style.removeProperty('border-color');
  input.style.removeProperty('font-weight');
  input.style.removeProperty('outline');
  input.style.removeProperty('outline-offset');
  input.classList.remove('changed', 'synced');

  if (state === 'changed') {
    input.classList.add('changed');
    if (input.type === 'checkbox') {
      input.style.outline = '2px solid #ef5350';
      input.style.outlineOffset = '2px';
    } else {
      input.style.color = '#ef5350';
      input.style.backgroundColor = '#2a1010';
      input.style.borderColor = '#ef5350';
      input.style.fontWeight = '600';
    }
  } else if (state === 'synced') {
    input.classList.add('synced');
    if (input.type === 'checkbox') {
      input.style.outline = '2px solid #66bb6a';
      input.style.outlineOffset = '2px';
    } else {
      input.style.color = '#66bb6a';
      input.style.borderColor = '#66bb6a';
    }
  }
  // 'neutral' — só removemos os estilos acima, deixa como default do CSS base
}

function setInputValue(input, raw, markSynced) {
  if (input.dataset.type === 'bool') {
    input.checked = raw === 'True' || raw === 'true' || raw === '1';
  } else {
    input.value = raw;
  }
  input.dataset.currentServerValue = raw;
  _applyFieldState(input, markSynced ? 'synced' : 'neutral');
}

// Disparado em cada keystroke / change.
function markDirty(input) {
  const server = input.dataset.currentServerValue;
  let cur, same;
  if (input.dataset.type === 'bool') {
    cur = input.checked ? 'True' : 'False';
    same = (cur === server) || (cur === '1' && server === 'True') ||
           (cur === '0' && server === 'False');
  } else {
    cur = input.value.trim();
    same = cur === server;
  }
  if (same) {
    // value matches server — but we don't know if it was synced or just neutral
    // Conservative: go to neutral (white). If it was just synced and user
    // re-typed identical value, that's OK — still effectively unchanged.
    _applyFieldState(input, 'neutral');
  } else {
    _applyFieldState(input, 'changed');
  }
}

async function readOne(input) {
  const proto = input.dataset.protocol || 'odrv';
  const v = proto === 'offb'
    ? await readPropOffb(input.dataset.path)
    : await readProp(input.dataset.path);
  if (v !== null) setInputValue(input, v, /*markSynced=*/false);  // BRANCO após read
}

async function writeOne(input) {
  const val = getInputValue(input);
  const proto = input.dataset.protocol || 'odrv';
  if (proto === 'offb') {
    // OpenFFBoard write returns valor ecoado, atualiza UI já com a resposta
    const r = await writePropOffb(input.dataset.path, val);
    if (r !== null) setInputValue(input, r, /*markSynced=*/true);  // VERDE após ✓
  } else {
    await writeProp(input.dataset.path, val);
    // Readback ODrive
    const v = await readProp(input.dataset.path);
    if (v !== null) setInputValue(input, v, /*markSynced=*/true);  // VERDE após ✓
  }
}

async function readAll() {
  const inputs = document.querySelectorAll('#content input, #content select');
  let n = 0;
  for (const inp of inputs) {
    await readOne(inp);
    n++;
  }
  logLine('--- readAll: ' + n + ' fields ---');
}

function exportJSON() {
  const obj = {};
  document.querySelectorAll('#content input, #content select').forEach(inp => {
    const v = inp.dataset.currentServerValue;
    if (v !== undefined && v !== '') obj[inp.dataset.path] = v;
  });
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'odrive_config_' + new Date().toISOString().replace(/[:.]/g, '-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  document.getElementById('file-import').click();
}

async function doImport(file) {
  const text = await file.text();
  const obj = JSON.parse(text);
  let n = 0;
  document.querySelectorAll('#content input, #content select').forEach(inp => {
    const v = obj[inp.dataset.path];
    if (v !== undefined) {
      if (inp.dataset.type === 'bool')
        inp.checked = (v === 'True' || v === '1' || v === true);
      else inp.value = v;
      markDirty(inp);
      n++;
    }
  });
  logLine('--- import: ' + n + ' fields loaded (não gravados ainda) ---');
}

/* =========================================================================
   Wire-up
   ========================================================================= */
document.getElementById('btn-connect').onclick = async () => {
  if (port) await disconnect();
  else await connect();
};
document.getElementById('btn-read-all').onclick = readAll;
// "Save" unificado — sequência completa:
//   1. Escreve campos alterados (writeDirty) — propaga UI → device runtime
//   2. Persiste FFB EEPROM (sys.save!) — params FFB em S10+S11 (não reboota)
//   3. Desarma motor (state=1 IDLE) — pré-requisito do save_configuration
//   4. Envia 'ss' — persiste config ODrive em S1+S2 e reboota
// Salvar FFB ANTES do ss garante que mudanças FFB persistem mesmo se ss falhar.
// Após reboot, se config tem startup_closed_loop_control=1, motor re-arma sozinho.
/* Tenta reabrir a serial usando uma porta já autorizada (getPorts não pede
   permissão de novo, ao contrário do requestPort). Usado após save: a placa
   reboota, USB cai, OS re-enumera, esta função pega o handle de volta. */
async function tryAutoReconnect(maxAttempts = 8, delayMs = 1000) {
  if (port) return false; // já conectado
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const ports = await navigator.serial.getPorts();
      if (ports && ports.length > 0) {
        // Pega a primeira porta autorizada — se o usuário tem mais de uma,
        // assume que a última usada é a primeira da lista (é o comportamento
        // observado em Chrome).
        const candidate = ports[0];
        try {
          await candidate.open({ baudRate: 115200, dataBits: 8, stopBits: 1, parity: 'none' });
          port = candidate;
          writer = port.writable.getWriter();
          reader = port.readable.getReader();
          setStatus(t('status.connected'), 'connected');
          toggleControls(true);
          logLine('--- auto-reconnect OK (tentativa ' + attempt + ') ---', 'rx');
          readLoop();
          return true;
        } catch (openErr) {
          // Porta listada mas não pôde abrir (ainda enumerando ou em uso) — tenta de novo.
        }
      }
    } catch (e) {}
    await new Promise(r => setTimeout(r, delayMs));
  }
  logLine('--- auto-reconnect falhou após ' + maxAttempts + ' tentativas — reconecte manualmente ---', 'err');
  return false;
}

async function saveAll() {
  const btn = document.getElementById('btn-save');
  const original = btn.textContent;
  btn.disabled = true;
  try {
    // 1. Grava alterações pendentes (UI → device RAM)
    btn.textContent = t('save.writing_changes');
    const changed = document.querySelectorAll('#content .changed');
    if (changed.length > 0) {
      logLine('--- Save: ' + changed.length + ' fields to write ---');
      for (const inp of changed) await writeOne(inp);
    }

    // 2. DESARMA MOTOR PRIMEIRO. Phase 4.x — antes vinha *depois* do FFB save.
    //    Bug: erase de flash (FFB EE ou ODrive NVM) trava prefetch da flash
    //    inteira por ~250ms-1.5s; o ISR FOC fica suspenso e ao retomar pode
    //    dar pulso de torque. Com motor IDLE primeiro, qualquer stall de ISR
    //    é inofensivo.
    btn.textContent = t('save.disarming');
    logLine('--- Save: disarm motor (state=1 IDLE) ---');
    await writeProp('axis0.requested_state', '1');
    await new Promise(r => setTimeout(r, 300));

    // 3. Persiste FFB EEPROM (sys.save!) — agora em S1+S2, não colide mais
    //    com a NVM ODrive (S10+S11). Não reboota, então é seguro antes do ss.
    btn.textContent = t('save.persisting_ffb');
    logLine('--- Save: FFB EEPROM (sys.save!) ---');
    const ffbResp = await execPropOffb('sys.save');
    logLine('sys.save! → ' + (ffbResp || 'timeout'), ffbResp === 'OK' ? 'rx' : 'err');

    // 4. Persiste ODrive NVM (ss reboota a placa)
    btn.textContent = t('save.persisting_odrive');
    logLine('--- Save: ODrive NVM (ss — persist + reboot) ---');
    await sendCmd('ss', false);

    // 5. Após ss a placa reseta — serial cai em ~1s. Aguarda 5s e tenta
    //    reconectar automaticamente, depois roda readAll() pra confirmar
    //    que valores persistiram. Se reconnect falhar, usuário reconecta
    //    manualmente — sem perda.
    btn.textContent = t('save.rebooting');
    logLine('--- Save: aguardando placa rebootar (5s) ---');
    // Limpa state de serial antigo (a porta vai morrer com o reboot do device)
    try { if (reader) { await reader.cancel(); reader.releaseLock(); reader = null; } } catch(e) {}
    try { if (writer) { writer.releaseLock(); writer = null; } } catch(e) {}
    try { if (port) { await port.close(); } } catch(e) {}
    port = null;
    setStatus(t('status.disconnected'));
    toggleControls(false);

    await new Promise(r => setTimeout(r, 5000));

    btn.textContent = t('save.reconnecting');
    logLine('--- Save: tentando auto-reconnect ---');
    const reconnected = await tryAutoReconnect();
    if (reconnected) {
      // Pequena pausa pra serial estabilizar (firmware ainda boot-up)
      await new Promise(r => setTimeout(r, 500));
      btn.textContent = t('save.reading_back');
      logLine('--- Save: re-lendo todos os campos pra confirmar persistência ---');
      try {
        await readAll();
        logLine('--- Save complete + re-read OK ---', 'rx');
        if (typeof toast === 'function') toast('Save complete + re-read OK', 'ok');
      } catch (e) {
        logLine('readAll após reconnect falhou: ' + e.message, 'err');
      }
    }
  } catch (e) {
    logLine('Save erro: ' + e.message, 'err');
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}
document.getElementById('btn-save').onclick = saveAll;
document.getElementById('btn-erase').onclick = () => {
  if (confirm('Apaga config persistida + reboota. Confirma?'))
    sendCmd('se', false);
};
document.getElementById('btn-reboot').onclick = () => sendCmd('sr', false);
document.getElementById('btn-export').onclick = exportJSON;
document.getElementById('btn-import').onclick = importJSON;
document.getElementById('file-import').onchange = (e) => {
  if (e.target.files[0]) doImport(e.target.files[0]);
};

wireConsoleTab();

const langSelect = document.getElementById('lang-select');
if (langSelect) {

/* =========================================================================
   Toast notifications — feedback visual leve sem alert() bloqueante.
   Uso: toast('mensagem', 'ok'|'err'|'warn')
   ========================================================================= */
function toast(msg, kind) {
  const box = document.getElementById('toasts');
  if (!box) return;
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' ' + kind : '');
  const icon = kind === 'ok' ? '✓' : kind === 'err' ? '✕' : kind === 'warn' ? '⚠' : 'ℹ';
  el.innerHTML = '<span class="icon">' + icon + '</span><span>' + msg + '</span>';
  box.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toast-out .25s ease-in forwards';
    setTimeout(() => el.remove(), 260);
  }, 3500);
}

/* =========================================================================
   Search — busca GLOBAL (em todas as abas). Mostra:
     - Cards filtrados na aba atual
     - Badges de contagem por aba na sidebar
     - Counter total no input
     - Banner "tem N matches em outras abas" se a aba atual tem 0 matches
   Limpa com Esc.
   ========================================================================= */
function applySearch(q) {
  q = (q || '').trim().toLowerCase();
  const counterEl = document.getElementById('search-count');
  const matchesByTab = {};

  // Limpa banner anterior em todas as abas
  document.querySelectorAll('.search-redirect').forEach(el => el.remove());

  if (!q) {
    document.body.classList.remove('search-active');
    document.querySelectorAll('.tab-panel .field').forEach(c => c.classList.remove('search-match'));
    document.querySelectorAll('#sidebar-nav .match-count').forEach(b => b.remove());
    if (counterEl) counterEl.hidden = true;
    return;
  }

  document.body.classList.add('search-active');

  // Marca matches em todas as abas
  document.querySelectorAll('.tab-panel .field').forEach(card => {
    const lbl = card.querySelector('label');
    const path = (lbl?.dataset.fieldPath || '').toLowerCase();
    const text = (lbl?.textContent || '').toLowerCase();
    const match = q && (path.includes(q) || text.includes(q));
    card.classList.toggle('search-match', !!match);
    if (match) {
      const panel = card.closest('.tab-panel');
      const tabId = panel?.id?.replace(/^tab-/, '');
      if (tabId) matchesByTab[tabId] = (matchesByTab[tabId] || 0) + 1;
    }
  });

  // Atualiza badges de contagem na sidebar
  document.querySelectorAll('#sidebar-nav .sidebar-item').forEach(item => {
    const tabId = item.dataset.tab;
    const count = matchesByTab[tabId] || 0;
    let badge = item.querySelector('.match-count');
    if (count > 0) {
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'match-count';
        item.appendChild(badge);
      }
      badge.textContent = String(count);
    } else if (badge) {
      badge.remove();
    }
  });

  // Counter total no input
  const total = Object.values(matchesByTab).reduce((a, b) => a + b, 0);
  if (counterEl) {
    counterEl.hidden = false;
    counterEl.textContent = total + ' match' + (total === 1 ? '' : 'es');
    counterEl.classList.toggle('zero', total === 0);
  }

  // Se a aba atual tem 0 matches mas outras têm, mostra banner com links
  const activePanel = document.querySelector('.tab-panel.active');
  if (activePanel) {
    const activeTabId = activePanel.id.replace(/^tab-/, '');
    const activeCount = matchesByTab[activeTabId] || 0;
    if (activeCount === 0 && total > 0) {
      const banner = document.createElement('div');
      banner.className = 'search-redirect';
      const otherTabs = Object.entries(matchesByTab).filter(([id]) => id !== activeTabId);
      const links = otherTabs.map(([id, n]) =>
        '<a data-jump="' + id + '">' + (t('tab.' + id) || id) + ' (' + n + ')</a>'
      ).join('');
      banner.innerHTML = t('search.no_match_here').replace('{q}', escapeHtml(q)) + ' ' + links;
      banner.querySelectorAll('a[data-jump]').forEach(a => {
        a.addEventListener('click', () => selectTab(a.dataset.jump));
      });
      activePanel.insertBefore(banner, activePanel.firstChild);
    } else if (total === 0) {
      const banner = document.createElement('div');
      banner.className = 'search-redirect';
      banner.innerHTML = t('search.no_match_anywhere').replace('{q}', escapeHtml(q));
      activePanel.insertBefore(banner, activePanel.firstChild);
    }
  }
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

const searchInput = document.getElementById('search-input');
if (searchInput) {
  searchInput.addEventListener('input', () => applySearch(searchInput.value));
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      applySearch('');
      searchInput.blur();
    }
  });
  // "/" em qualquer lugar foca a busca (atalho tipo GitHub)
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });
}

if (!('serial' in navigator)) {
  setStatus('Web Serial não suportado — use Chrome/Edge', 'error');
  document.getElementById('btn-connect').disabled = true;
}
