<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Odrive-Wheel — MKS XDrive Mini</title>
<style>
  /* ============================================================
     Odrive-Wheel v2 — Modern UI
     Design tokens (dark theme, indigo accent, generous spacing)
     ============================================================ */
  :root {
    --bg:        #0e1116;
    --bg-card:   #161b22;
    --bg-card-2: #1c222d;
    --bg-input:  #0b0e13;
    --border:    #2a313c;
    --border-strong: #3a4252;

    --fg:        #e6edf3;
    --fg-muted:  #8b949e;
    --fg-dim:    #6e7681;

    --accent:    #6366f1;
    --accent-h:  #4f46e5;
    --accent-2:  #818cf8;

    --ok:        #10b981;
    --warn:      #f59e0b;
    --err:       #ef4444;

    --sidebar-w: 240px;
    --header-h:  60px;
    --radius:    10px;
    --radius-sm: 6px;
    --shadow:    0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
    --shadow-lg: 0 4px 8px rgba(0,0,0,.4), 0 16px 32px rgba(0,0,0,.4);

    --transition: 180ms cubic-bezier(.4, 0, .2, 1);

    --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Code', 'SF Mono', Consolas, monospace;
  }

  * { box-sizing: border-box; }
  *::selection { background: var(--accent); color: #fff; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg); color: var(--fg);
    font-size: 14px; line-height: 1.5;
    overflow: hidden;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    grid-template-areas: "sidebar header" "sidebar main";
  }

  /* ============================================================
     Sidebar — left nav with logo + grouped tabs
     ============================================================ */
  aside.sidebar {
    grid-area: sidebar;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sidebar-logo {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo .icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    box-shadow: 0 2px 8px rgba(99,102,241,.3);
  }
  .sidebar-logo .name {
    font-weight: 700; font-size: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sidebar-section {
    padding: 8px 0;
  }
  .sidebar-section-title {
    padding: 12px 20px 6px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em;
    color: var(--fg-dim);
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    color: var(--fg-muted);
    cursor: pointer;
    font-size: 13.5px;
    border-left: 3px solid transparent;
    transition: var(--transition);
    user-select: none;
  }
  .sidebar-item:hover {
    background: var(--bg-card-2);
    color: var(--fg);
  }
  .sidebar-item.active {
    background: linear-gradient(90deg, rgba(99,102,241,.12), transparent);
    color: var(--accent-2);
    border-left-color: var(--accent);
  }
  .sidebar-item .ic {
    font-size: 15px; width: 20px; text-align: center;
  }

  /* ============================================================
     Header — sticky top with status pill, search, save
     ============================================================ */
  header.app-header {
    grid-area: header;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px; font-family: var(--font-mono);
    color: var(--fg-muted);
  }
  .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--fg-dim);
    transition: var(--transition);
  }
  .status-pill.connected { color: var(--ok); border-color: rgba(16,185,129,.3); }
  .status-pill.connected .dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s ease-in-out infinite; }
  .status-pill.error { color: var(--err); border-color: rgba(239,68,68,.3); }
  .status-pill.error .dot { background: var(--err); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  .header-search {
    flex: 1; max-width: 380px;
    position: relative;
  }
  .header-search input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--fg); font-size: 13px;
    font-family: var(--font-sans);
    transition: var(--transition);
  }
  .header-search input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .header-search::before {
    content: '⌕'; position: absolute;
    left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--fg-dim); font-size: 16px;
    pointer-events: none;
  }
  .search-count {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 11px; font-family: var(--font-mono);
    color: var(--accent-2);
    background: rgba(99,102,241,.15);
    border: 1px solid rgba(99,102,241,.3);
    padding: 1px 7px; border-radius: 999px;
    pointer-events: none;
  }
  .search-count.zero {
    color: var(--fg-dim);
    background: var(--bg-card-2);
    border-color: var(--border);
  }
  .sidebar-item .match-count {
    margin-left: auto;
    font-size: 10.5px; font-family: var(--font-mono);
    color: var(--accent-2);
    background: rgba(99,102,241,.18);
    border: 1px solid rgba(99,102,241,.35);
    padding: 0 6px; border-radius: 999px;
    min-width: 18px; text-align: center;
  }
  .sidebar-item.active .match-count {
    background: rgba(99,102,241,.3);
  }
  .header-actions {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }

  /* ============================================================
     Buttons — clean, hover lift
     ============================================================ */
  button {
    background: var(--bg-card-2);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    transition: var(--transition);
  }
  button:hover:not(:disabled) {
    background: var(--border-strong);
    border-color: var(--border-strong);
  }
  button:active:not(:disabled) {
    transform: translateY(1px);
  }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.primary:hover:not(:disabled) {
    background: var(--accent-h); border-color: var(--accent-h);
  }
  button.ok {
    background: var(--ok); color: #fff; border-color: var(--ok);
  }
  button.ok:hover:not(:disabled) {
    filter: brightness(1.1);
  }
  button.danger {
    background: var(--err); color: #fff; border-color: var(--err);
  }
  button.icon {
    padding: 7px 10px; font-size: 15px; line-height: 1;
  }

  select {
    background: var(--bg-input);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }

  /* ============================================================
     Main content — cards layout
     ============================================================ */
  main#content {
    grid-area: main;
    overflow-y: auto;
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
    gap: 18px;
    align-content: start;
  }

  /* The .group div becomes a card-section header */
  .group {
    grid-column: 1 / -1;
    font-weight: 600;
    font-size: 16px;
    color: var(--fg);
    padding: 16px 0 8px;
    margin-top: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .group::before {
    content: '';
    width: 3px; height: 18px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-radius: 2px;
  }
  .group:first-child { margin-top: 0; padding-top: 0; }

  /* Each .field becomes a card */
  .field {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; flex-direction: column;
    gap: 8px;
    transition: var(--transition);
  }
  .field:hover {
    border-color: var(--border-strong);
    background: var(--bg-card-2);
  }
  .field label {
    font-family: var(--font-mono);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--fg);
    cursor: help;
    display: flex; flex-wrap: wrap; align-items: baseline;
    gap: 6px;
  }
  .field label .type {
    color: var(--fg-dim); font-size: 11px;
    font-weight: 400;
  }
  .field label .range {
    color: var(--accent-2); font-size: 11px;
    background: rgba(99,102,241,.12);
    padding: 1px 6px; border-radius: 4px;
    font-style: normal; font-family: var(--font-mono);
    margin-left: auto;
  }
  .field .value {
    display: flex; gap: 6px; align-items: center;
  }
  .field input[type="text"], .field input[type="number"], .field select {
    flex: 1;
    background: var(--bg-input);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 13px;
    min-width: 0;
    transition: var(--transition);
  }
  .field input[type="text"]:focus,
  .field input[type="number"]:focus,
  .field select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .field input[type="checkbox"] {
    width: 20px; height: 20px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .field input[type="checkbox"].changed { accent-color: var(--err); }
  .field input[type="checkbox"].synced  { accent-color: var(--ok); }
  .field button {
    padding: 6px 10px; font-size: 12px;
  }
  .field button.btn-read { background: transparent; }

  .tab-panel { display: none; }
  .tab-panel.active { display: contents; }

  /* ============================================================
     Specialty sections (Debug / FFB Live) — wider cards
     ============================================================ */
  .debug-section {
    grid-column: 1 / -1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    box-shadow: var(--shadow);
  }
  .debug-section h3 {
    margin: 0 0 12px; color: var(--fg);
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .debug-section h3::before {
    content: '';
    width: 3px; height: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-radius: 2px;
  }
  .debug-section h3 small {
    color: var(--fg-muted); font-size: 12px;
    font-weight: 400;
  }
  .action-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
  }
  .action-grid button {
    padding: 12px 14px; text-align: left;
    background: var(--bg-card-2);
    border-radius: var(--radius-sm);
  }
  .action-grid button .sub {
    display: block; color: var(--fg-muted);
    font-size: 11px; font-family: var(--font-mono);
    margin-top: 3px;
  }
  .action-grid button.warn  { border-color: rgba(245,158,11,.4); }
  .action-grid button.danger { border-color: rgba(239,68,68,.4); }
  .live-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 8px;
  }
  .live-kv {
    display: flex; justify-content: space-between; gap: 12px;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 12.5px;
  }
  .live-kv .k { color: var(--fg-muted); }
  .live-kv .v { color: var(--fg); text-align: right; font-weight: 500; }
  .live-kv .v.ok   { color: var(--ok); }
  .live-kv .v.err  { color: var(--err); }
  .live-kv .v.warn { color: var(--warn); }
  .err-row {
    display: grid; grid-template-columns: 220px 140px 1fr auto;
    gap: 10px; padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 4px;
    font-family: var(--font-mono); font-size: 12.5px;
    align-items: center;
  }
  .err-row .k { color: var(--fg-muted); }
  .err-row .hex { text-align: right; }
  .err-row .hex.ok { color: var(--ok); }
  .err-row .hex.err { color: var(--err); }
  .err-row .bits { color: var(--warn); font-size: 11px; }

  .poll-ctl { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .poll-ctl input[type="number"] {
    width: 80px; background: var(--bg-input); color: var(--fg);
    border: 1px solid var(--border); padding: 6px 8px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
  }
  .poll-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: var(--fg-dim);
    transition: var(--transition);
  }
  .poll-dot.on {
    background: var(--ok);
    box-shadow: 0 0 12px var(--ok);
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* ============================================================
     Console tab
     ============================================================ */
  #panel-console-tab.tab-panel.active {
    display: flex; flex-direction: column;
  }
  .console-toolbar {
    grid-column: 1 / -1;
    display: flex; gap: 10px;
    margin-bottom: 12px;
    align-items: center;
  }
  .console-box {
    grid-column: 1 / -1; flex: 1;
    overflow-y: auto;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-family: var(--font-mono); font-size: 12.5px;
    min-height: 500px;
  }
  #log { margin: 0; white-space: pre-wrap; }
  #log .tx  { color: var(--accent-2); }
  #log .rx  { color: var(--ok); }
  #log .err { color: var(--err); }

  /* Console input bar (manual command entry) */
  .console-input-bar {
    grid-column: 1 / -1;
    display: flex; align-items: stretch; gap: 8px;
    margin-top: 10px;
  }
  .console-input-bar .prompt {
    display: flex; align-items: center; padding: 0 6px 0 2px;
    color: var(--accent-2); font-family: var(--font-mono);
    font-size: 18px; font-weight: 700;
  }
  .console-input-bar input {
    flex: 1;
    background: var(--bg-input); color: var(--fg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: var(--font-mono); font-size: 13px;
    transition: var(--transition);
  }
  .console-input-bar input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .console-input-bar input:disabled { opacity: .5; cursor: not-allowed; }

  /* ============================================================
     Inputs tab — GPIO cards (button/axis config + live preview)
     ============================================================ */
  .inputs-status {
    grid-column: 1 / -1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .inputs-status .status-led {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--fg-dim);
    transition: var(--transition);
    flex-shrink: 0;
  }
  .inputs-status.connected .status-led {
    background: var(--ok);
    box-shadow: 0 0 12px var(--ok);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .inputs-status.error .status-led {
    background: var(--err);
  }
  .inputs-status .text {
    color: var(--fg);
    font-size: 13px;
  }
  .inputs-status .text .sub {
    color: var(--fg-muted); font-size: 12px; margin-left: 6px;
  }
  .gpio-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; flex-direction: column;
    gap: 10px;
    transition: var(--transition);
    position: relative;
  }
  .gpio-card.active {
    border-color: rgba(99, 102, 241, .4);
    background: linear-gradient(135deg, rgba(99,102,241,.05), transparent 50%);
  }
  .gpio-card .badge {
    margin-left: auto;
    padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-family: var(--font-mono);
    background: var(--bg-card-2); color: var(--fg-muted);
    border: 1px solid var(--border);
  }
  .gpio-card.active .badge {
    color: var(--ok);
    border-color: rgba(16,185,129,.4);
    background: rgba(16,185,129,.1);
  }
  .gpio-card h4 {
    margin: 0; font-size: 13.5px; font-weight: 600;
    color: var(--fg);
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono);
  }
  .gpio-card h4 .pin {
    color: var(--fg-dim); font-size: 11px;
    font-weight: 400; margin-left: auto;
  }
  .gpio-card .row {
    display: flex; gap: 8px; align-items: center;
  }
  .gpio-card .row > label {
    font-size: 12px; color: var(--fg-muted);
    min-width: 70px;
  }
  .gpio-card select, .gpio-card input[type="number"] {
    flex: 1;
    background: var(--bg-input);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 9px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    min-width: 0;
  }
  .gpio-card input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
  }
  .gpio-card button.capture {
    padding: 5px 10px; font-size: 11px;
  }
  .gpio-card .live {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .gpio-card .live .label {
    color: var(--fg-muted); font-size: 11px;
  }
  .gpio-card .live .value {
    color: var(--fg); flex: 1; text-align: right;
  }
  .gpio-card .live .indicator-btn {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--fg-dim); transition: var(--transition);
  }
  .gpio-card .live .indicator-btn.on {
    background: var(--ok);
    box-shadow: 0 0 10px var(--ok);
  }
  .gpio-card .live .bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--bg-card-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .gpio-card .live .bar {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 80ms linear;
  }
  .inputs-controls {
    grid-column: 1 / -1;
    display: flex; gap: 10px; align-items: center;
    padding: 6px 0;
  }
  .inputs-controls .poll-info {
    color: var(--fg-muted); font-size: 11.5px;
    margin-left: auto;
  }

  /* ============================================================
     DFU Flash tab — step cards + progress bar
     ============================================================ */
  .dfu-step {
    grid-column: 1 / -1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    box-shadow: var(--shadow);
    transition: var(--transition);
  }
  .dfu-step.done {
    border-color: rgba(16,185,129,.35);
    background: linear-gradient(135deg, rgba(16,185,129,.06), transparent 60%);
  }
  .dfu-step.error {
    border-color: rgba(239,68,68,.4);
    background: linear-gradient(135deg, rgba(239,68,68,.08), transparent 60%);
  }
  .dfu-step h3 {
    margin: 0 0 6px; color: var(--fg);
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .dfu-step .badge {
    margin-left: auto;
    padding: 2px 10px; border-radius: 999px;
    font-size: 11px; font-family: var(--font-mono);
    background: var(--bg-card-2); color: var(--fg-muted);
    border: 1px solid var(--border);
  }
  .dfu-step.done .badge {
    color: var(--ok); border-color: rgba(16,185,129,.4);
    background: rgba(16,185,129,.1);
  }
  .dfu-step.error .badge {
    color: var(--err); border-color: rgba(239,68,68,.4);
    background: rgba(239,68,68,.1);
  }
  .dfu-step p {
    color: var(--fg-muted); font-size: 13px; margin: 4px 0 12px;
    line-height: 1.5;
  }
  .dfu-step .hint {
    grid-column: unset;
    color: var(--fg-dim); font-size: 12px;
    margin-top: 8px; padding: 8px 10px;
    background: var(--bg-input); border-radius: var(--radius-sm);
    border-left: 2px solid var(--border-strong);
    font-family: var(--font-mono);
  }
  .dfu-step .row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .dfu-step .file-info {
    color: var(--fg); font-size: 12.5px;
    font-family: var(--font-mono);
  }
  .dfu-step .file-info .sub {
    color: var(--fg-muted); margin-left: 6px;
  }
  .dfu-progress {
    width: 100%; height: 8px;
    background: var(--bg-input);
    border-radius: 999px; overflow: hidden;
    margin-top: 10px;
    border: 1px solid var(--border);
  }
  .dfu-progress > div {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .15s linear;
  }
  .dfu-log {
    grid-column: 1 / -1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-family: var(--font-mono); font-size: 12px;
    max-height: 240px; overflow-y: auto;
    white-space: pre-wrap; line-height: 1.5;
  }
  .dfu-log .ok  { color: var(--ok); }
  .dfu-log .err { color: var(--err); }
  .dfu-log .info { color: var(--fg-muted); }

  /* ============================================================
     Toast notifications (slide in from top right)
     ============================================================ */
  #toasts {
    position: fixed; top: 76px; right: 24px;
    z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
    max-width: 380px;
  }
  .toast {
    pointer-events: auto;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 13px;
    color: var(--fg);
    animation: toast-in .25s ease-out;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .toast.ok   { border-left-color: var(--ok); }
  .toast.err  { border-left-color: var(--err); }
  .toast.warn { border-left-color: var(--warn); }
  .toast .icon { font-size: 16px; line-height: 1.3; }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(100%); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes toast-out {
    to { opacity: 0; transform: translateX(100%); }
  }

  /* ============================================================
     Search hide/show — só esconde dentro do tab ATIVO. As outras abas
     ficam display:none por padrão, mas seus matches são contados e
     mostrados no badge da sidebar.
     ============================================================ */
  body.search-active .tab-panel.active .field { display: none; }
  body.search-active .tab-panel.active .field.search-match { display: flex; }
  body.search-active .tab-panel.active .group { display: none; }
  /* Banner mostrando quantos matches tem em outras abas, quando a aba atual tem 0 */
  .search-redirect {
    grid-column: 1 / -1;
    padding: 16px 20px;
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    color: var(--fg-muted); font-size: 13.5px;
    line-height: 1.6;
  }
  .search-redirect b { color: var(--accent-2); }
  .search-redirect a {
    color: var(--accent-2); cursor: pointer;
    text-decoration: underline; margin-right: 10px;
  }

  /* ============================================================
     Scrollbar styling
     ============================================================ */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* ============================================================
     Hint paragraphs in dynamic tabs
     ============================================================ */
  .hint {
    grid-column: 1 / -1;
    color: var(--fg-muted);
    font-size: 12px;
    margin: 0;
  }
</style>

function fieldRange(path) {
  return FIELD_RANGE[path] || '';
}

let currentLang = (function() {
  const saved = localStorage.getItem('odrive-lang');
  if (saved === 'pt' || saved === 'en') return saved;
  return navigator.language && navigator.language.startsWith('pt') ? 'pt' : 'en';
})();

function t(key) {
  return I18N[currentLang]?.[key] ?? I18N.en[key] ?? key;
}
function fieldDesc(path) {
  return FIELD_DESC[currentLang]?.[path] ?? FIELD_DESC.en?.[path] ?? '';
}
function applyI18n() {
  // Atualiza o atributo lang no html
  document.documentElement.lang = currentLang === 'pt' ? 'pt-br' : 'en';
  document.title = t('header.title');
  // Walk DOM atualizando elementos com data-i18n e data-i18n-title
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  // Placeholders de inputs (search box e similares)
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  // Atualiza tabs (label dos botões)
  document.querySelectorAll('nav#tabs button[data-tab]').forEach(btn => {
    btn.textContent = t('tab.' + btn.dataset.tab);
  });
  // Atualiza groups (recriados a cada applyI18n via re-render)
  document.querySelectorAll('.group[data-i18n-key]').forEach(el => {
    el.textContent = t(el.dataset.i18nKey);
  });
  // Atualiza títulos de sessão e items da sidebar
  document.querySelectorAll('#sidebar-nav [data-i18n-key]').forEach(el => {
    if (el.dataset.i18nKey) el.textContent = t(el.dataset.i18nKey);
  });
  // Atualiza items da sidebar (nome do tab, mantendo o ícone intacto)
  document.querySelectorAll('#sidebar-nav .sidebar-item').forEach(item => {
    const lbl = item.querySelector('span:not(.ic)');
    if (lbl && lbl.dataset.i18nKey) lbl.textContent = t(lbl.dataset.i18nKey);
  });
  // Atualiza tooltips dos labels de campos com base em FIELD_DESC
  document.querySelectorAll('.field label[data-field-path]').forEach(el => {
    const desc = fieldDesc(el.dataset.fieldPath);
    if (desc) el.title = desc;
  });
  // Status — preserva classe atual e ícone (dot)
  const status = document.getElementById('status');
  const statusTxt = document.getElementById('status-text');
  if (status && statusTxt) {
    if (status.classList.contains('connected')) {
      statusTxt.textContent = t('status.connected');
    } else if (!status.classList.contains('error')) {
      statusTxt.textContent = t('status.disconnected');
    }
  }
  // Botão connect/disconnect
  const btnConn = document.getElementById('btn-connect');
  if (btnConn) {
    const isConn = btnConn.textContent.toLowerCase().includes('desconect') ||
                   btnConn.textContent.toLowerCase().includes('disconn');
    btnConn.textContent = t(isConn ? 'btn.disconnect' : 'btn.connect');
  }
}
function setLang(lang) {
  if (lang !== 'pt' && lang !== 'en') return;
  currentLang = lang;
  localStorage.setItem('odrive-lang', lang);
  applyI18n();
}

function decodeErr(hexVal, bitMap) {
  const v = parseInt(hexVal, 16);
  if (isNaN(v) || v === 0) return 'OK';
  const bits = [];
  for (const [mask, name] of Object.entries(bitMap)) {
    if (v & parseInt(mask)) bits.push(name);
  }
  const unkn = v & ~Object.keys(bitMap).reduce((a, m) => a | parseInt(m), 0);
  if (unkn) bits.push('(+bits 0x' + unkn.toString(16) + ')');
  return bits.join(' | ') || '(bits desconhecidos)';
}

const LOG_MAX = 500;
let logPaused = false;

function logLine(text, cls) {
  if (logPaused) return;
  const pre = document.getElementById('log');
  if (!pre) return;  // aba Console ainda não foi construída
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  pre.appendChild(span);
  if (pre.childNodes.length > LOG_MAX) pre.removeChild(pre.firstChild);
  pre.scrollTop = pre.scrollHeight;
}

function wireConsoleTab() {
  const clearBtn = document.getElementById('btn-console-clear');
  const pauseBtn = document.getElementById('btn-console-pause');
  if (!clearBtn || !pauseBtn) return;
  clearBtn.addEventListener('click', () => {
    const pre = document.getElementById('log');
    if (pre) pre.innerHTML = '';
  });
  pauseBtn.addEventListener('click', () => {
    logPaused = !logPaused;
    pauseBtn.dataset.i18n = logPaused ? 'console.resume' : 'console.pause';
    pauseBtn.textContent = t(logPaused ? 'console.resume' : 'console.pause');
    pauseBtn.style.background = logPaused ? 'var(--warn)' : '';
    pauseBtn.style.color = logPaused ? '#000' : '';
  });

  // Manual command input: digite e Enter envia (ou clica Enviar).
  // Histórico tipo shell: ↑/↓ navega últimos 50 comandos, persiste em
  // localStorage. Não filtra/valida — manda exatamente o que você digitou
  // (com \n no final). Útil pra testes de baixo nível: 'sys.eedump?',
  // 'r axis0.error', 'w motor.config.pole_pairs 7', etc.
  const inputEl = document.getElementById('console-input');
  const sendBtn = document.getElementById('btn-console-send');
  if (inputEl && sendBtn) {
    let history = [];
    try { history = JSON.parse(localStorage.getItem('odrive-console-history') || '[]'); } catch(e) {}
    let histIdx = history.length;  // aponta pra "depois do último" (= linha em branco)

    const doSend = async () => {
      const cmd = inputEl.value.trim();
      if (!cmd) return;
      if (!writer) {
        logLine('Não conectado. Clique em Conectar antes.', 'err');
        return;
      }
      // Push pro histórico (sem duplicar consecutivo)
      if (history[history.length - 1] !== cmd) {
        history.push(cmd);
        while (history.length > 50) history.shift();
        try { localStorage.setItem('odrive-console-history', JSON.stringify(history)); } catch(e) {}
      }
      histIdx = history.length;
      inputEl.value = '';
      try {
        await sendCmd(cmd, false);
      } catch (e) {
        logLine('send err: ' + e.message, 'err');
      }
    };

    sendBtn.addEventListener('click', doSend);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        doSend();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        histIdx = Math.max(0, histIdx - 1);
        inputEl.value = history[histIdx] || '';
        // Põe cursor no fim
        setTimeout(() => inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length), 0);
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx >= history.length) { inputEl.value = ''; return; }
        histIdx++;
        inputEl.value = histIdx < history.length ? history[histIdx] : '';
      }
    });
  }
}

/* =========================================================================
   DFU Flash tab — re-flash o firmware pelo navegador via WebUSB.

   Fluxo:
     1) Send "sd\n" via Web Serial (CDC) → firmware seta _reboot_cookie=0xDEADBEEF
        e chama NVIC_SystemReset(). early_start_checks() detecta e salta
        pra 0x1FFF0000 (bootloader STM32 interno). USB re-enumerea como
        0483:DF11 com classe DFU.
     2) navigator.usb.requestDevice({filters: [0483:DF11]}) — usuário aprova.
     3) <input type=file> pra escolher .bin (~400 KB).
     4) DfuSe protocol (extensão ST do DFU 1.1):
        - Set Address Pointer (DNLOAD com 0x21 + addr LE)
        - Erase setores cobertos pela imagem (DNLOAD com 0x41 + addr LE)
        - Download em chunks de transferSize (1 KB normalmente)
        - Manifest (DNLOAD len=0) → Get Status até dfuMANIFEST-WAIT-RESET
        - Detach: bootloader pula pro firmware novo, USB re-enumerea como CDC.

   Implementação inspirada em devanlai/webdfu (ISC license). Reescrito
   compacto pra embed no HTML sem dependência externa.
   ========================================================================= */
const DFU = {
  // bRequest values (USB DFU 1.1 + DfuSe extension)
  DETACH: 0x00, DNLOAD: 0x01, UPLOAD: 0x02, GETSTATUS: 0x03,
  CLRSTATUS: 0x04, GETSTATE: 0x05, ABORT: 0x06,
  // bState values
  appIDLE: 0, appDETACH: 1, dfuIDLE: 2, dfuDNLOAD_SYNC: 3, dfuDNBUSY: 4,
  dfuDNLOAD_IDLE: 5, dfuMANIFEST_SYNC: 6, dfuMANIFEST: 7,
  dfuMANIFEST_WAIT_RESET: 8, dfuUPLOAD_IDLE: 9, dfuERROR: 10,
  // bStatus values (subset)
  OK: 0x00, errTARGET: 0x01, errFILE: 0x02, errWRITE: 0x03, errERASE: 0x04,
  // STM32F405 sector layout (start, size)
  // Application = sectors 0-9 (last 2 sectors S10/S11 are EEPROM emul)
  // We only erase 0-9 (up to 0x080BFFFF).
  STM32F4_SECTORS: [
    { start: 0x08000000, size: 16  * 1024 }, // S0
    { start: 0x08004000, size: 16  * 1024 }, // S1
    { start: 0x08008000, size: 16  * 1024 }, // S2
    { start: 0x0800C000, size: 16  * 1024 }, // S3
    { start: 0x08010000, size: 64  * 1024 }, // S4
    { start: 0x08020000, size: 128 * 1024 }, // S5
    { start: 0x08040000, size: 128 * 1024 }, // S6
    { start: 0x08060000, size: 128 * 1024 }, // S7
    { start: 0x08080000, size: 128 * 1024 }, // S8
    { start: 0x080A0000, size: 128 * 1024 }, // S9
    // S10 / S11 = EEPROM, NÃO apagamos
  ],
};

const dfuState = {
  device: null,         // USBDevice from WebUSB
  iface: 0,             // interface number (always 0 for STM32 ROM bootloader)
  altSetting: 0,        // alt setting 0 = internal flash
  transferSize: 1024,   // wTransferSize from functional descriptor
  fileBuf: null,        // ArrayBuffer of the .bin
  fileName: '',
};

function dfuLog(msg, kind) {
  const box = document.getElementById('dfu-log');
  if (!box) return;
  const span = document.createElement('span');
  span.className = kind || 'info';
  span.textContent = '[' + new Date().toISOString().slice(11,19) + '] ' + msg + '\n';
  box.appendChild(span);
  box.scrollTop = box.scrollHeight;
}

function dfuStepDone(stepEl, label) {
  stepEl.classList.remove('error');
  stepEl.classList.add('done');
  const badge = stepEl.querySelector('.badge');
  if (badge) badge.textContent = label || '✓ OK';
}
function dfuStepError(stepEl, label) {
  stepEl.classList.remove('done');
  stepEl.classList.add('error');
  const badge = stepEl.querySelector('.badge');
  if (badge) badge.textContent = label || '✕ erro';
}
function dfuStepReset(stepEl) {
  stepEl.classList.remove('done', 'error');
  const badge = stepEl.querySelector('.badge');
  if (badge) badge.textContent = '—';
}

        <button id="dfu-btn-detect" data-i18n="dfu.step2.btn">Procurar bootloader</button>
        <span id="dfu-detect-info" class="file-info"></span>
      </div>
      <div class="hint" data-i18n="dfu.step2.hint">No Windows, pode ser preciso instalar driver WinUSB no bootloader (uma vez só) — use Zadig: https://zadig.akeo.ie/.</div>
    </div>

    <!-- Step 3: Pick file -->
    <div class="dfu-step" id="dfu-step3">
      <h3>
        <span data-i18n="dfu.step3.title">3. Selecionar firmware (.bin)</span>
        <span class="badge">—</span>
      </h3>
      <p data-i18n="dfu.step3.desc">Escolha o arquivo odrive-wheel.bin (~400 KB).</p>
      <div class="row">
        <button id="dfu-btn-pick" data-i18n="dfu.step3.btn">Escolher arquivo</button>
        <input type="file" id="dfu-file" accept=".bin" style="display:none;">
        <span id="dfu-file-info" class="file-info"></span>
      </div>
    </div>

    <!-- Step 4: Flash -->
    <div class="dfu-step" id="dfu-step4">
      <h3>
        <span data-i18n="dfu.step4.title">4. Gravar</span>
        <span class="badge">—</span>
      </h3>
      <p data-i18n="dfu.step4.desc">
        Apaga os setores de aplicação e grava o novo firmware. A placa reboota sozinha ao final.
      </p>
      <div class="row">
        <button id="dfu-btn-flash" class="ok" disabled data-i18n="dfu.step4.btn">Gravar firmware</button>
      </div>
      <div class="dfu-progress"><div id="dfu-progress-bar"></div></div>
    </div>

    <!-- Log -->
    <div class="debug-section" style="grid-column:1/-1;">
      <h3 data-i18n="dfu.log.title">Log de operações</h3>
      <pre class="dfu-log" id="dfu-log"></pre>
    </div>
  `;
}

/* =========================================================================
   Inputs tab — GPIO 1..4 da MKS XDrive Mini configuráveis como botões ou
   eixos do joystick HID. Comandos firmware (sintaxe OpenFFBoard cmdparser):
     gpio.<inst>.mode    0=off / 1=button / 2=axis
     gpio.<inst>.idx     0..63 (button) ou 0..3 (axis: 0=Rx,1=Ry,2=Rz,3=Slider)
     gpio.<inst>.invert  0/1
     gpio.<inst>.amin    0..4095 (axis only)
     gpio.<inst>.amax    0..4095 (axis only)
     gpio.<inst>.cur?    leitura raw atual (0/1 botão, 0..4095 eixo)
   Polling de live indicator: 200 ms quando aba ativa.
   ========================================================================= */
const INPUTS_GPIOS = [1, 2, 3, 4];
const INPUTS_PIN_NAMES = { 1: 'PA0 (ADC1_IN0)', 2: 'PA1 (ADC1_IN1)', 3: 'PA2 (ADC1_IN2)', 4: 'PA3 (ADC1_IN3)' };
const INPUTS_AXIS_NAMES = ['Rx', 'Ry', 'Rz', 'Slider'];
let inputsPollTimer = null;

function buildInputsHTML() {
  const cards = INPUTS_GPIOS.map(i => `
    <div class="gpio-card" id="gpio-card-${i}">
      <h4>
        <span data-i18n="inputs.gpio_label">GPIO</span> ${i}

      </h4>
      <div class="row">
        <label data-i18n="inputs.mode">Mode</label>
        <select data-gpio="${i}" data-field="mode">
          <option value="0" data-i18n="inputs.mode_off">Off</option>
          <option value="1" data-i18n="inputs.mode_button">Button</option>
          <option value="2" data-i18n="inputs.mode_axis">Axis</option>
        </select>
      </div>
      <div class="row" data-show-when="button">
        <label data-i18n="inputs.button_idx">Button #</label>
        <input type="number" min="0" max="63" data-gpio="${i}" data-field="idx-button">
      </div>
      <div class="row" data-show-when="axis">
        <label data-i18n="inputs.axis_idx">Axis</label>
        <select data-gpio="${i}" data-field="idx-axis">
          <option value="0">Rx</option>
          <option value="1">Ry</option>
          <option value="2">Rz</option>
          <option value="3">Slider</option>
        </select>
      </div>
      <div class="row">
        <label data-i18n="inputs.invert">Invert</label>
        <input type="checkbox" data-gpio="${i}" data-field="invert">
      </div>
      <div class="row" data-show-when="axis">
        <label data-i18n="inputs.amin">ADC min</label>
        <input type="number" min="0" max="4095" data-gpio="${i}" data-field="amin">
        <button class="capture" data-gpio="${i}" data-field="capture-min" data-i18n="inputs.capture_min">Capture min</button>
      </div>
      <div class="row" data-show-when="axis">
        <label data-i18n="inputs.amax">ADC max</label>
        <input type="number" min="0" max="4095" data-gpio="${i}" data-field="amax">
        <button class="capture" data-gpio="${i}" data-field="capture-max" data-i18n="inputs.capture_max">Capture max</button>
      </div>
      <div class="live">
        <span class="label" data-i18n="inputs.live_label">Current</span>
        <div class="bar-wrap" data-show-when="axis"><div class="bar" id="gpio-bar-${i}"></div></div>
        <div class="indicator-btn" id="gpio-ind-${i}" data-show-when="button"></div>
        <span class="value" id="gpio-val-${i}">—</span>
      </div>
    </div>
  `).join('');

  return `
    <div class="debug-section" style="grid-column:1/-1;">
      <h3 data-i18n="inputs.title">Entradas digitais e analógicas</h3>
      <p style="color:var(--fg-muted);font-size:13px;margin:0;" data-i18n="inputs.subtitle">
        GPIOs 1-4 da MKS XDrive Mini configuráveis como botões ou eixos do joystick HID.
      </p>
    </div>

    <div class="inputs-status" id="inputs-status">
      <div class="status-led"></div>

      </div>
      <button id="inputs-toggle-poll" class="primary" data-i18n="inputs.btn_start"
              style="margin-left:auto">▶ Iniciar leitura</button>
    </div>

    <div class="inputs-controls">
      <span class="poll-info" data-i18n="inputs.note">
        Salvar persiste no EEPROM. Botões funcionam pressionando para GND.
      </span>
    </div>

}

function wireInputsTab() {
  if (!document.getElementById('gpio-card-1')) return;

  // Helper pra atualizar visibilidade dos rows + badge baseado no modo
  const refreshVisibility = (cardEl, mode) => {
    cardEl.classList.toggle('active', mode !== '0');
    cardEl.querySelectorAll('[data-show-when]').forEach(el => {
      const want = el.dataset.showWhen;
      const show = (want === 'button' && mode === '1') || (want === 'axis' && mode === '2');
      el.style.display = show ? '' : 'none';
    });
    // Badge no header do card
    const badge = cardEl.querySelector('.badge');
    if (badge) {
      const key = mode === '1' ? 'inputs.badge_button'
                : mode === '2' ? 'inputs.badge_axis'
                : 'inputs.badge_off';
      badge.dataset.i18n = key;
      badge.textContent = t(key);
    }
  };

  // Atualiza o status global (header da aba)
  // states: 'disconnected' | 'idle' (conectado, não polling) | 'connected' (polling) | 'error'
  const setStatusHeader = (state, info) => {
    const box = document.getElementById('inputs-status');
    const txt = document.getElementById('inputs-status-text');
    if (!box || !txt) return;
    box.classList.remove('connected', 'error');
    if (state === 'connected') {
      box.classList.add('connected');
      txt.innerHTML = t('inputs.status_polling') +
        ' <b>' + (info || '5') + '</b> ' + t('inputs.status_polling_unit');
    } else if (state === 'idle') {
      txt.textContent = t('inputs.status_idle');
    } else if (state === 'error') {
      box.classList.add('error');
      txt.textContent = info || '';
    } else {
      txt.textContent = t('inputs.status_disconnected');
    }
  };

  // Carrega cfg atual do device pra cada GPIO (chamado no connect)
  // Não bloqueia a UI se sem conexão — campos ficam em default.
  const sendOffb = async (cmd, isExec) => {
    if (!writer) return null;
    return await sendCmd(cmd, !isExec).catch(() => null);
  };

  const reload = async () => {
    if (!writer) return;
    for (const i of INPUTS_GPIOS) {
      const card = document.getElementById('gpio-card-' + i);
      if (!card) continue;

      // Lê todos os campos via OpenFFBoard cmdparser (sufixo "?" = GET).
      const m  = await sendOffb('gpio.' + i + '.mode?', false);
      const ix = await sendOffb('gpio.' + i + '.idx?', false);
      const iv = await sendOffb('gpio.' + i + '.invert?', false);
      const am = await sendOffb('gpio.' + i + '.amin?', false);
      const ax = await sendOffb('gpio.' + i + '.amax?', false);

      // Reply OpenFFBoard: "[gpio.N.field?|VALUE]". Extrai o VALUE.
      const parse = (r) => { if (!r) return null; const x = r.match(/\|(-?\d+)\]/); return x ? x[1] : null; };
      const mv = parse(m), ixv = parse(ix), ivv = parse(iv), amv = parse(am), axv = parse(ax);

      if (mv !== null) {
        card.querySelector('[data-field="mode"]').value = mv;
        refreshVisibility(card, mv);
      }
      if (ixv !== null) {
        // idx é um valor único; exibido em button-idx ou axis-idx conforme mode
        card.querySelector('[data-field="idx-button"]').value = ixv;
        const axIdx = parseInt(ixv, 10);
        const axSel = card.querySelector('[data-field="idx-axis"]');
        if (axIdx >= 0 && axIdx <= 3) axSel.value = String(axIdx);
      }
      if (ivv !== null) card.querySelector('[data-field="invert"]').checked = ivv === '1';
      if (amv !== null) card.querySelector('[data-field="amin"]').value = amv;
      if (axv !== null) card.querySelector('[data-field="amax"]').value = axv;
    }
  };

  // Send field change via OpenFFBoard set
  const sendSet = async (gpio, field, value) => {
    if (!writer) {
      toast('Conecte primeiro', 'err');
      return;
    }
    await sendOffb('gpio.' + gpio + '.' + field + '=' + value, false);
  };

  // Listeners por card
  INPUTS_GPIOS.forEach(i => {
    const card = document.getElementById('gpio-card-' + i);

    const modeSel  = card.querySelector('[data-field="mode"]');
    const idxBtn   = card.querySelector('[data-field="idx-button"]');
    const idxAxis  = card.querySelector('[data-field="idx-axis"]');
    const invertCk = card.querySelector('[data-field="invert"]');
    const aminIn   = card.querySelector('[data-field="amin"]');
    const amaxIn   = card.querySelector('[data-field="amax"]');
    const capMin   = card.querySelector('[data-field="capture-min"]');
    const capMax   = card.querySelector('[data-field="capture-max"]');

    modeSel.addEventListener('change', async () => {
      const v = modeSel.value;
      refreshVisibility(card, v);
      await sendSet(i, 'mode', v);
    });
    idxBtn.addEventListener('change', () => sendSet(i, 'idx', idxBtn.value));
    idxAxis.addEventListener('change', () => sendSet(i, 'idx', idxAxis.value));
    invertCk.addEventListener('change', () => sendSet(i, 'invert', invertCk.checked ? '1' : '0'));
    aminIn.addEventListener('change', () => sendSet(i, 'amin', aminIn.value));
    amaxIn.addEventListener('change', () => sendSet(i, 'amax', amaxIn.value));

    // "Capture min/max": lê valor atual via gpio.N.cur? e seta amin/amax local + remoto
    capMin.addEventListener('click', async () => {
      const r = await sendOffb('gpio.' + i + '.cur?', false);
      const x = r ? r.match(/\|(\d+)\]/) : null;
      if (x) {
        aminIn.value = x[1];
        await sendSet(i, 'amin', x[1]);
        toast('GPIO ' + i + ' min capturado: ' + x[1], 'ok');
      }
    });
    capMax.addEventListener('click', async () => {
      const r = await sendOffb('gpio.' + i + '.cur?', false);
      const x = r ? r.match(/\|(\d+)\]/) : null;
      if (x) {
        amaxIn.value = x[1];
        await sendSet(i, 'amax', x[1]);
        toast('GPIO ' + i + ' max capturado: ' + x[1], 'ok');
      }
    });
  });

  // Live indicator polling — só roda quando aba Inputs está ativa
  const pollLive = async () => {
    if (!writer) {
      setStatusHeader('disconnected');
      return;
    }
    setStatusHeader('connected', '5');
    for (const i of INPUTS_GPIOS) {
      const card = document.getElementById('gpio-card-' + i);
      if (!card) continue;
      const mode = card.querySelector('[data-field="mode"]').value;
      if (mode === '0') {
        document.getElementById('gpio-val-' + i).textContent = '—';
        continue;
      }
      const r = await sendOffb('gpio.' + i + '.cur?', false);
      const x = r ? r.match(/\|(\d+)\]/) : null;
      if (!x) continue;
      const raw = parseInt(x[1], 10);
      document.getElementById('gpio-val-' + i).textContent = String(raw);

      if (mode === '1') {
        const ind = document.getElementById('gpio-ind-' + i);
        ind.classList.toggle('on', raw === 1);
      } else if (mode === '2') {
        const bar = document.getElementById('gpio-bar-' + i);
        const pct = Math.max(0, Math.min(100, (raw / 4095) * 100));
        bar.style.width = pct + '%';
      }
    }
  };

  // Iniciar/parar polling — manual via botão no header de status. Não roda
  // automaticamente pra evitar tráfego serial conflitante com outras abas.
  const inputsStartPoll = () => {
    if (inputsPollTimer) clearInterval(inputsPollTimer);
    inputsPollTimer = setInterval(() => { pollLive().catch(() => {}); }, 200);
    setStatusHeader(writer ? 'connected' : 'disconnected', '5');
    updatePollButton(true);
  };
  const inputsStopPoll = () => {
    if (inputsPollTimer) { clearInterval(inputsPollTimer); inputsPollTimer = null; }
    setStatusHeader(writer ? 'idle' : 'disconnected');
    updatePollButton(false);
  };
  const updatePollButton = (running) => {
    const btn = document.getElementById('inputs-toggle-poll');
    if (!btn) return;
    const key = running ? 'inputs.btn_stop' : 'inputs.btn_start';
    btn.dataset.i18n = key;
    btn.textContent = t(key);
    btn.classList.toggle('primary', !running);
    btn.classList.toggle('danger', running);
  };

  // Botão Start/Stop polling — lê valores ao vivo só quando solicitado
  const togglePollBtn = document.getElementById('inputs-toggle-poll');
  if (togglePollBtn) {
    togglePollBtn.addEventListener('click', () => {
      if (inputsPollTimer) inputsStopPoll();
      else inputsStartPoll();
    });
  }

  // Hook: ao entrar na aba inputs, recarrega cfg uma vez (sem polling).
  // Ao sair, para o poll se estiver rodando.
  document.querySelectorAll('#sidebar-nav .sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
      if (item.dataset.tab === 'inputs') {
        reload().catch(() => {});
        setStatusHeader(writer ? 'idle' : 'disconnected');
        updatePollButton(false);
      } else {
        inputsStopPoll();
      }
    });
  });

  // Expose pra fora (caso queira chamar reload depois de connect)
  window.inputsReload = reload;
}

function wireDFUTab() {
  const btnEnter = document.getElementById('dfu-btn-enter');
  const btnDetect = document.getElementById('dfu-btn-detect');
  const btnPick = document.getElementById('dfu-btn-pick');
  const btnFlash = document.getElementById('dfu-btn-flash');
  const fileInput = document.getElementById('dfu-file');
  if (!btnEnter || !btnDetect || !btnPick || !btnFlash || !fileInput) return;

  // Step 1: send "sd" via Web Serial
  btnEnter.addEventListener('click', async () => {
    if (!writer) {
      dfuLog('Não conectado à placa via Web Serial.', 'err');
      toast('Conecte primeiro à placa', 'err');
      dfuStepError(document.getElementById('dfu-step1'), '✕ não conectado');
      return;
    }
    if (!('usb' in navigator)) {
      dfuLog(t('dfu.warn.no_webusb'), 'err');
      toast('WebUSB não disponível', 'err');
      return;
    }
    try {
      dfuLog('Enviando comando "sd" para entrar em DFU...', 'info');
      await sendCmd('sd', false);
      dfuLog('Comando enviado. A placa deve reiniciar e re-enumerar como STM32 BOOTLOADER em 1-2s.', 'ok');
      dfuStepDone(document.getElementById('dfu-step1'), '✓ comando enviado');
      // Try to keep serial closed so OS releases handle
      try { await disconnect(); } catch(e) {}
      toast('Aguarde 2s e clique em "Procurar bootloader"', 'ok');
    } catch (e) {
      dfuLog('Falha ao enviar "sd": ' + e.message, 'err');
      dfuStepError(document.getElementById('dfu-step1'));
    }
  });

  // Step 2: WebUSB requestDevice for STM32 bootloader
  btnDetect.addEventListener('click', async () => {
    if (!('usb' in navigator)) {
      dfuLog(t('dfu.warn.no_webusb'), 'err');
      return;
    }
    try {
      dfuLog('Procurando dispositivo USB 0483:DF11...', 'info');
      const dev = await navigator.usb.requestDevice({
        filters: [{ vendorId: 0x0483, productId: 0xDF11 }]
      });
      await dev.open();
      if (dev.configuration === null) await dev.selectConfiguration(1);
      // Iface 0 alt 0 = internal flash @ 0x08000000 on STM32F4 ROM bootloader
      await dev.claimInterface(0);
      try { await dev.selectAlternateInterface(0, 0); } catch(e) {}
      dfuState.device = dev;
      dfuState.iface = 0;
      dfuState.altSetting = 0;
      // Read transfer size from DFU functional descriptor (best effort)
      try {
        const cfg = await dev.controlTransferIn({
          requestType: 'standard', recipient: 'device',
          request: 0x06, value: 0x0200, index: 0
        }, 256);
        const view = new DataView(cfg.data.buffer);
        // Walk descriptors looking for type 0x21 (DFU functional)
        let off = view.getUint8(0);
        while (off < view.byteLength) {
          const len = view.getUint8(off);
          const type = view.getUint8(off + 1);
          if (type === 0x21 && len >= 9) {
            dfuState.transferSize = view.getUint16(off + 5, true);
            break;
          }
          off += len;
          if (len === 0) break;
        }
      } catch(e) { /* keep default 1024 */ }
      const info = document.getElementById('dfu-detect-info');
      const productName = dev.productName || 'STM32 BOOTLOADER';
      info.innerHTML = '✓ ' + productName +
        ' <span class="sub">VID:0x' + dev.vendorId.toString(16).padStart(4,'0') +
        ' PID:0x' + dev.productId.toString(16).padStart(4,'0') +
        ' xferSize=' + dfuState.transferSize + 'B</span>';
      dfuLog('Bootloader detectado: ' + productName + ' (VID=0x' + dev.vendorId.toString(16) +
             ' PID=0x' + dev.productId.toString(16) + ' transferSize=' + dfuState.transferSize + 'B)', 'ok');
      dfuStepDone(document.getElementById('dfu-step2'));
      updateFlashEnabled();
    } catch (e) {
      dfuLog('Erro ao procurar/abrir bootloader: ' + e.message, 'err');
      dfuLog(t('dfu.warn.zadig'), 'err');
      dfuStepError(document.getElementById('dfu-step2'));
    }
  });

  // Step 3: pick file
  btnPick.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      dfuState.fileBuf = await f.arrayBuffer();
      dfuState.fileName = f.name;
      const sz = dfuState.fileBuf.byteLength;
      const info = document.getElementById('dfu-file-info');
      info.innerHTML = '✓ ' + f.name +
        ' <span class="sub">(' + (sz / 1024).toFixed(1) + ' KB)</span>';
      dfuLog('Arquivo selecionado: ' + f.name + ' (' + sz + ' bytes)', 'ok');
      // Sanity check
      if (sz < 50 * 1024) {
        dfuLog('AVISO: arquivo muito pequeno (<50 KB). Confirme que é um firmware válido.', 'err');
      }
      if (sz > 768 * 1024) {
        dfuLog('AVISO: arquivo muito grande (>768 KB) — pode invadir setores S10/S11 da EEPROM emulada.', 'err');
      }
      dfuStepDone(document.getElementById('dfu-step3'));
      updateFlashEnabled();
    } catch (err) {
      dfuLog('Erro lendo arquivo: ' + err.message, 'err');
      dfuStepError(document.getElementById('dfu-step3'));
    }
  });

  // Step 4: flash
  btnFlash.addEventListener('click', async () => {
    if (!dfuState.device || !dfuState.fileBuf) {
      dfuLog('Pré-requisitos faltando (bootloader detectado + arquivo escolhido).', 'err');
      return;
    }
    btnFlash.disabled = true;
    dfuStepReset(document.getElementById('dfu-step4'));
    try {
      await dfuFlashSequence();
      dfuStepDone(document.getElementById('dfu-step4'), '✓ gravado');
      toast('Firmware gravado e placa reiniciada', 'ok');
    } catch (e) {
      dfuLog('FLASH FALHOU: ' + e.message, 'err');
      dfuStepError(document.getElementById('dfu-step4'));
      toast('Flash falhou: ' + e.message, 'err');
    } finally {
      btnFlash.disabled = false;
    }
  });

  function updateFlashEnabled() {
    btnFlash.disabled = !(dfuState.device && dfuState.fileBuf);
  }
}

/* ----------------------- DfuSe protocol primitives ----------------------- */
async function dfuControlOut(bRequest, wValue, data) {
  const result = await dfuState.device.controlTransferOut({
    requestType: 'class', recipient: 'interface',
    request: bRequest, value: wValue, index: dfuState.iface
  }, data);
  if (result.status !== 'ok') throw new Error('USB OUT status=' + result.status);
  return result;
}
async function dfuControlIn(bRequest, wValue, length) {
  const result = await dfuState.device.controlTransferIn({
    requestType: 'class', recipient: 'interface',
    request: bRequest, value: wValue, index: dfuState.iface
  }, length);
  if (result.status !== 'ok') throw new Error('USB IN status=' + result.status);
  return new Uint8Array(result.data.buffer);
}
async function dfuGetStatus() {
  const data = await dfuControlIn(DFU.GETSTATUS, 0, 6);
  return {
    bStatus: data[0],
    bwPollTimeout: data[1] | (data[2] << 8) | (data[3] << 16),
    bState:  data[4],
  };
}
async function dfuClearStatus() { await dfuControlOut(DFU.CLRSTATUS, 0, new ArrayBuffer(0)); }
async function dfuAbort()       { await dfuControlOut(DFU.ABORT,    0, new ArrayBuffer(0)); }

async function dfuPollUntilIdle(targetState, timeoutMs) {
  const start = Date.now();
  while (Date.now() - start < (timeoutMs || 30000)) {
    const st = await dfuGetStatus();
    if (st.bStatus !== DFU.OK) {
      throw new Error('DFU status=0x' + st.bStatus.toString(16) + ' state=' + st.bState);
    }
    if (st.bState === targetState) return st;
    await new Promise(r => setTimeout(r, Math.max(st.bwPollTimeout, 5)));
  }
  throw new Error('Timeout esperando state=' + targetState);
}

// DfuSe special command: DNLOAD wBlockNum=0 with data = [cmd, ...payload]
async function dfuSeCommand(cmd, payload) {
  const buf = new Uint8Array(1 + payload.length);
  buf[0] = cmd;
  buf.set(payload, 1);
  await dfuControlOut(DFU.DNLOAD, 0, buf);
  // Two GET_STATUS reads required by DfuSe spec for special commands
  let st = await dfuGetStatus();
  if (st.bState === DFU.dfuDNBUSY) {
    await new Promise(r => setTimeout(r, Math.max(st.bwPollTimeout, 5)));
    st = await dfuGetStatus();
  }
  if (st.bStatus !== DFU.OK) {
    throw new Error('DfuSe cmd 0x' + cmd.toString(16) + ' falhou status=0x' + st.bStatus.toString(16));
  }
}
function dfuSeAddrPayload(addr) {
  return new Uint8Array([
    addr        & 0xff,
    (addr >> 8) & 0xff,
    (addr >> 16) & 0xff,
    (addr >> 24) & 0xff,
  ]);
}
async function dfuSeSetAddress(addr) { await dfuSeCommand(0x21, dfuSeAddrPayload(addr)); }
async function dfuSeErasePage(addr)  { await dfuSeCommand(0x41, dfuSeAddrPayload(addr)); }

/* ----------------------- High-level flash sequence ----------------------- */
async function dfuFlashSequence() {
  const fwBytes = new Uint8Array(dfuState.fileBuf);
  const baseAddr = 0x08000000;
  const totalSize = fwBytes.byteLength;
  const progress = document.getElementById('dfu-progress-bar');
  const setProgress = (pct) => { if (progress) progress.style.width = pct + '%'; };

  // 0. Make sure we're in dfuIDLE (clear any stale errors)
  dfuLog('Verificando estado inicial do bootloader...', 'info');
  let st = await dfuGetStatus();
  if (st.bState === DFU.dfuERROR) {
    dfuLog('Bootloader em estado de erro, limpando...', 'info');
    await dfuClearStatus();
    st = await dfuGetStatus();
  }
  if (st.bState !== DFU.dfuIDLE) {
    try { await dfuAbort(); } catch(e) {}
    st = await dfuGetStatus();
  }
  dfuLog('Estado inicial OK (state=' + st.bState + ')', 'ok');

  // 1. Determine which sectors to erase (only the ones that overlap the firmware)
  const endAddr = baseAddr + totalSize;
  const sectorsToErase = DFU.STM32F4_SECTORS.filter(s =>
    s.start < endAddr && s.start + s.size > baseAddr
  );
  dfuLog('Apagando ' + sectorsToErase.length + ' setor(es) (cobre ' +
         (totalSize/1024).toFixed(1) + ' KB)...', 'info');
  setProgress(2);

  for (let i = 0; i < sectorsToErase.length; i++) {
    const s = sectorsToErase[i];
    dfuLog('  - Erase S' + DFU.STM32F4_SECTORS.indexOf(s) +
           ' @ 0x' + s.start.toString(16) + ' (' + (s.size/1024) + ' KB)', 'info');
    await dfuSeErasePage(s.start);
    // erase pode demorar até 2-3s no setor de 128 KB; já é tratado por dfuSeCommand poll.
    setProgress(2 + (i + 1) * 18 / sectorsToErase.length);
  }
  dfuLog('Erase concluído.', 'ok');

  // 2. Set address pointer ao início
  dfuLog('Posicionando endereço em 0x08000000...', 'info');
  await dfuSeSetAddress(baseAddr);
  // Need to abort to leave the address-set state and return to dfuIDLE before download
  try { await dfuAbort(); } catch(e) {}
  await dfuPollUntilIdle(DFU.dfuIDLE, 5000);

  // 3. Download em chunks
  const xferSize = dfuState.transferSize;
  const totalChunks = Math.ceil(totalSize / xferSize);
  dfuLog('Gravando ' + totalSize + ' bytes em ' + totalChunks + ' chunks de ' + xferSize + ' B...', 'info');

  // wBlockNum starts at 2 for DfuSe (0 = special cmd, 1 = reserved by ST)
  for (let i = 0; i < totalChunks; i++) {
    const start = i * xferSize;
    const end = Math.min(start + xferSize, totalSize);
    const chunk = fwBytes.subarray(start, end);
    const blockNum = 2 + i;
    await dfuControlOut(DFU.DNLOAD, blockNum, chunk);
    // Poll status: state should go DNBUSY → DNLOAD_IDLE
    let cs = await dfuGetStatus();
    while (cs.bState === DFU.dfuDNBUSY) {
      await new Promise(r => setTimeout(r, Math.max(cs.bwPollTimeout, 1)));
      cs = await dfuGetStatus();
    }
    if (cs.bStatus !== DFU.OK) {
      throw new Error('Download chunk ' + i + ' status=0x' + cs.bStatus.toString(16));
    }
    if (i % 16 === 0 || i === totalChunks - 1) {
      const pct = 20 + 75 * (i + 1) / totalChunks;
      setProgress(pct);
      dfuLog('  chunk ' + (i+1) + '/' + totalChunks + ' (0x' +
             (baseAddr + end).toString(16) + ')', 'info');
    }
  }
  dfuLog('Download completo.', 'ok');

  // 4. Manifest: zero-length DNLOAD signals end-of-transfer
  dfuLog('Manifest (finalizando)...', 'info');
  await dfuControlOut(DFU.DNLOAD, 0, new ArrayBuffer(0));
  // Poll until manifest done. STM bootloader transitions to dfuMANIFEST_WAIT_RESET
  // and may stall on the next GET_STATUS — both outcomes are success.
  setProgress(98);
  try {
    let ms = await dfuGetStatus();
    while (ms.bState === DFU.dfuMANIFEST || ms.bState === DFU.dfuMANIFEST_SYNC) {
      await new Promise(r => setTimeout(r, Math.max(ms.bwPollTimeout, 5)));
      ms = await dfuGetStatus();
    }
  } catch(e) {
    // STM bootloader detaches; transfer error here is normal
    dfuLog('Manifest concluído (bootloader desconectou — esperado).', 'info');
  }

  // 5. Tenta forçar leave (control transfer pode falhar — esperado)
  try {
    await dfuState.device.close();
  } catch(e) {}
  dfuState.device = null;
  setProgress(100);
  dfuLog('Firmware gravado com sucesso. A placa está reiniciando com o novo firmware.', 'ok');
  dfuLog('Reconecte via "Conectar" depois que o LED indicar boot completo.', 'info');
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  const txt = document.getElementById('status-text');
  if (txt) {
    txt.textContent = text;
  } else {
    el.textContent = text;
  }
  // Preserva sempre a classe base "status-pill" e adiciona o estado ('connected'|'error')
  el.className = 'status-pill' + (cls ? ' ' + cls : '');
}

async function connect() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200, dataBits: 8, stopBits: 1, parity: 'none' });
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    setStatus(t('status.connected'), 'connected');
    toggleControls(true);
    logLine('--- conectado ---');
    readLoop();
    // Auto-read de todos os campos pra popular UI com estado real do device.
    // Pequena pausa pra serial estabilizar antes de mandar flood de comandos.
    setTimeout(() => {
      logLine('--- auto-readAll após conexão ---');
      readAll().catch(e => logLine('readAll auto erro: ' + e.message, 'err'));
    }, 200);
  } catch (e) {
    setStatus('Erro: ' + e.message, 'error');
    logLine('Erro conexão: ' + e.message, 'err');
  }
}

async function disconnect() {
  stopPolling && stopPolling();
  if (typeof ffbPollStop === 'function') ffbPollStop();
  try {
    if (reader) { await reader.cancel(); reader.releaseLock(); reader = null; }
    if (writer) { writer.releaseLock(); writer = null; }
    if (port) { await port.close(); port = null; }
  } catch (e) {}
  setStatus(t('status.disconnected'));
  toggleControls(false);
  const pollChk = document.getElementById('poll-enable');
  if (pollChk) pollChk.checked = false;
  const ffbChk = document.getElementById('ffb-poll-enable');
  if (ffbChk) ffbChk.checked = false;
}

async function readLoop() {
  const dec = new TextDecoder();
  try {
    while (port && reader) {
      const { value, done } = await reader.read();
      if (done) break;
      readBuffer += dec.decode(value);
      let idx;
      while ((idx = readBuffer.indexOf('\n')) >= 0) {
        const line = readBuffer.slice(0, idx).replace(/\r$/, '');
        readBuffer = readBuffer.slice(idx + 1);
        if (line.length) {
          logLine('← ' + line, 'rx');
          const p = pendingReplies.shift();
          if (p) { clearTimeout(p.timeout); p.resolve(line); }
        }
      }
    }
  } catch (e) {
    logLine('readLoop erro: ' + e.message, 'err');
    disconnect();
  }
}

async function sendCmd(cmd, expectReply) {
  if (!writer) throw new Error('not connected');
  logLine('→ ' + cmd, 'tx');
  await writer.write(new TextEncoder().encode(cmd + '\n'));
  if (!expectReply) return null;
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      const idx = pendingReplies.findIndex(p => p.resolve === resolve);
      if (idx >= 0) pendingReplies.splice(idx, 1);
      reject(new Error('timeout'));
    }, 2000);
    pendingReplies.push({ resolve, timeout });
  });
}

async function readProp(path) {
  try {
    return await sendCmd('r ' + path, true);
  } catch (e) {
    logLine('r ' + path + ' → timeout', 'err');
    return null;
  }
}

async function writeProp(path, value) {
  await sendCmd('w ' + path + ' ' + value, false);
}

// OpenFFBoard CmdParser — formato "class.cmd?" ou "class.cmd=value"
// Reply: "[class.cmd?|VALUE]" ou "[class.cmd=VALUE|VALUE]". Extrai o VALUE
// de dentro do pipe.
function _extractOffbValue(reply) {
  if (!reply) return null;
  // Aceita tanto [foo.bar?|VAL] quanto [foo.0.bar?|VAL] (com instance)
  const m = reply.match(/^\[[^|]+\|([\s\S]*)\]$/);
  return m ? m[1] : reply;
}
async function readPropOffb(path) {
  try {
    const reply = await sendCmd(path + '?', true);
    return _extractOffbValue(reply);
  } catch (e) {
    logLine(path + '? → timeout', 'err');
    return null;
  }
}
async function writePropOffb(path, value) {
  try {
    const reply = await sendCmd(path + '=' + value, true);
    return _extractOffbValue(reply);
  } catch (e) {
    logLine(path + '=' + value + ' → timeout', 'err');
    return null;
  }
}
async function execPropOffb(path) {
  try {
    const reply = await sendCmd(path + '!', true);
    return _extractOffbValue(reply);
  } catch (e) {
    logLine(path + '! → timeout', 'err');
    return null;
  }
}

function toggleControls(connected) {
  const ids = ['btn-read-all', 'btn-save',
               'btn-erase', 'btn-reboot', 'btn-export', 'btn-import'];
  ids.forEach(i => { const el = document.getElementById(i); if (el) el.disabled = !connected; });
  document.getElementById('btn-connect').textContent =
    connected ? t('btn.disconnect') : t('btn.connect');
}

function tabId(tabRef) { return 'tab-' + tabRef; }

function buildTabs() {
  const nav = document.getElementById('tabs');
  const sideNav = document.getElementById('sidebar-nav');
  const content = document.getElementById('content');

  // ---- Sidebar (modern UI) ----
  // Indexa SCHEMA por id pra resolver labels.
  const tabById = {};
  SCHEMA.forEach(t => { tabById[t.id] = t; });

  SIDEBAR_GROUPS.forEach(grp => {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    const ttl = document.createElement('div');
    ttl.className = 'sidebar-section-title';
    ttl.dataset.i18nKey = grp.titleKey || '';
    ttl.textContent = grp.titleKey ? t(grp.titleKey) : grp.title;
    section.appendChild(ttl);
    grp.items.forEach(tabId_ => {
      const tab = tabById[tabId_];
      if (!tab) return;
      const item = document.createElement('div');
      item.className = 'sidebar-item';
      item.dataset.tab = tab.id;
      const tabKey = 'tab.' + tab.id;
      const ic  = document.createElement('span');
      ic.className = 'ic'; ic.textContent = TAB_ICONS[tab.id] || '•';
      const lbl = document.createElement('span');
      lbl.dataset.i18nKey = tabKey;
      lbl.textContent = (I18N[currentLang] && I18N[currentLang][tabKey]) || tab.label;
      item.appendChild(ic);
      item.appendChild(lbl);
      item.onclick = () => selectTab(tab.id);
      section.appendChild(item);
    });
    sideNav.appendChild(section);
  });

  SCHEMA.forEach((tab, i) => {
    const btn = document.createElement('button');
    btn.textContent = tab.label;
    btn.dataset.tab = tab.id;
    btn.onclick = () => selectTab(tab.id);
    nav.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'tab-panel';
    panel.id = tabId(tab.id);

    // Debug tab — custom UI (actions, live monitor, errors, setpoints)
    if (tab.custom && tab.id === 'debug') {
      panel.innerHTML = buildDebugHTML();
      content.appendChild(panel);
      return;
    }
    // FFB Live tab — custom UI (live FFB state, counters, peaks)
    if (tab.custom && tab.id === 'ffb-live') {
      panel.innerHTML = buildFFBLiveHTML();
      content.appendChild(panel);
      return;
    }
    // Console tab — log de TX/RX e mensagens internas + input manual
    if (tab.custom && tab.id === 'console-tab') {
      panel.innerHTML = `
        <div class="console-toolbar">
          <button id="btn-console-clear" data-i18n="console.clear">Limpar</button>
          <button id="btn-console-pause" data-paused="0" data-i18n="console.pause">⏸ Pausar</button>
          <span style="color:var(--muted);font-size:11px;margin-left:auto">
            <span class="k" style="color:var(--accent)">→</span> TX
            &nbsp;<span class="k" style="color:var(--ok)">←</span> RX
            &nbsp;<span class="k" style="color:var(--err)">!</span> erro
          </span>
        </div>
        <pre id="log" class="console-box"></pre>
        <div class="console-input-bar">
          <span class="prompt">›</span>
          <input type="text" id="console-input"
                 data-i18n-placeholder="console.input_placeholder"
                 placeholder="Digite comando ASCII (Enter envia, ↑/↓ histórico)…"
                 autocomplete="off" spellcheck="false">
          <button id="btn-console-send" class="primary" data-i18n="console.send">Enviar</button>
        </div>
        <p class="hint" style="grid-column:1/-1;color:var(--fg-dim);font-size:11.5px;margin:4px 0 0">
          <span data-i18n="console.input_hint">Exemplos: <code>r vbus_voltage</code> · <code>w axis0.requested_state 1</code> · <code>ss</code> · <code>sys.save?</code> · <code>sys.eedump?</code></span>
        </p>
      `;
      content.appendChild(panel);
      return;
    }
    // DFU Flash tab — re-flash via WebUSB
    if (tab.custom && tab.id === 'dfu') {
      panel.innerHTML = buildDFUHTML();
      content.appendChild(panel);
      return;
    }
    // Inputs tab — GPIO 1-4 config (button/axis) + live preview
    if (tab.custom && tab.id === 'inputs') {
      panel.innerHTML = buildInputsHTML();
      content.appendChild(panel);
      return;
    }

    tab.fields.forEach(fld => {
      if (fld.group) {
        const g = document.createElement('div');
        g.className = 'group';
        // Mapeia label → key i18n. Se houver chave registrada usa, senão fallback raw text.
        const groupKey = GROUP_KEY_MAP[fld.group];
        if (groupKey) {
          g.dataset.i18nKey = groupKey;
          g.textContent = t(groupKey);
        } else {
          g.textContent = fld.group;
        }
        panel.appendChild(g);
        return;
      }
      const path = tab.prefix + fld.name;
      const labelEl = document.createElement('label');
      labelEl.dataset.fieldPath = path;
      // Tooltip: descrição + path técnico no final
      const desc = fieldDesc(path);
      labelEl.title = desc || path;
      const range = fieldRange(path);
      labelEl.innerHTML = fld.name +
        '<span class="type">(' + fld.type +
        (fld.opts ? ' ['+Object.keys(fld.opts).length+']' : '') + ')</span>' +
        (range ? '<span class="range">[' + range + ']</span>' : '');
      labelEl.htmlFor = 'in-' + path;

      const valWrap = document.createElement('div');
      valWrap.className = 'value';
      let input;
      if (fld.type === 'bool') {
        input = document.createElement('input');
        input.type = 'checkbox';
      } else if (fld.type === 'enum') {
        input = document.createElement('select');
        for (const [k, v] of Object.entries(fld.opts)) {
          const o = document.createElement('option');
          o.value = k; o.textContent = k + ' — ' + v;
          input.appendChild(o);
        }
      } else {
        input = document.createElement('input');
        input.type = 'text';
        input.placeholder = fld.type;
      }
      input.id = 'in-' + path;
      input.dataset.path = path;
      input.dataset.type = fld.type;
      input.dataset.protocol = tab.protocol || 'odrv';
      input.dataset.currentServerValue = '';
      input.addEventListener('input', () => markDirty(input));
      input.addEventListener('change', () => markDirty(input));

      const btnRead = document.createElement('button');
      btnRead.textContent = '↻';
      btnRead.title = 'Ler do device';
      btnRead.onclick = () => readOne(input);

      const btnWrite = document.createElement('button');
      btnWrite.textContent = '✓';
      btnWrite.title = 'Gravar no device';
      btnWrite.onclick = () => writeOne(input);

      valWrap.appendChild(input);
      valWrap.appendChild(btnRead);
      valWrap.appendChild(btnWrite);
      panel.appendChild(labelEl);
      panel.appendChild(valWrap);
    });

    content.appendChild(panel);
  });
  selectTab(SCHEMA[0].id);
}
